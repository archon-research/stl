# =============================================================================
# LOCAL DEV ONLY — do NOT include in k8s/overlays/prod or k8s/overlays/staging.
# In EKS, the shared Temporal server runs in the `temporal` k8s namespace
# (infrastructure repo: gitops/tooling/archon-prod/temporal/).
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  namespace: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.27.0
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: temporal-db-rw
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: temporal-db-app
                  key: username
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: temporal-db-app
                  key: password
            - name: BIND_ON_IP
              value: 0.0.0.0
            - name: DEFAULT_NAMESPACE
              value: vector
          ports:
            - containerPort: 7233
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-server
  namespace: temporal
spec:
  type: NodePort
  selector:
    app: temporal-server
  ports:
    - port: 7233
      targetPort: 7233
      nodePort: 30233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.45.3
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-server:7233
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: temporal
spec:
  type: NodePort
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30823
