apiVersion: apps/v1
kind: Deployment
metadata:
  name: avalanche-sparklend-position-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avalanche-sparklend-position-tracker
  template:
    metadata:
      labels:
        app: avalanche-sparklend-position-tracker
    spec:
      serviceAccountName: avalanche-sparklend-position-tracker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: avalanche-sparklend-position-tracker
          image: avalanche-sparklend-position-tracker
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: avalanche-sparklend-position-tracker
          resources:
            requests:
              cpu: "1000m"
              memory: "2048Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f sparklend"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
