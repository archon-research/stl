apiVersion: apps/v1
kind: Deployment
metadata:
  name: avalanche-sparklend-position-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avalanche-sparklend-position-tracker
  template:
    metadata:
      labels:
        app: avalanche-sparklend-position-tracker
    spec:
      serviceAccountName: avalanche-sparklend-position-tracker
      containers:
        - name: avalanche-sparklend-position-tracker
          image: avalanche-sparklend-position-tracker
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: JAEGER_ENDPOINT
              value: "localhost:4317"
          envFrom:
            - configMapRef:
                name: avalanche-sparklend-position-tracker-config
            - secretRef:
                name: avalanche-sparklend-position-tracker
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f sparklend"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
