apiVersion: apps/v1
kind: Deployment
metadata:
  name: watcher-data-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watcher-data-validator
  template:
    metadata:
      labels:
        app: watcher-data-validator
    spec:
      serviceAccountName: watcher-data-validator
      containers:
        - name: watcher-data-validator
          image: watcher-data-validator
          envFrom:
            - configMapRef:
                name: watcher-data-validator
            - secretRef:
                name: watcher-data-validator
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f cronjob"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
