apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-worker
  template:
    metadata:
      labels:
        app: backup-worker
    spec:
      serviceAccountName: backup-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: backup-worker
          image: backup-worker
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: backup-worker
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f raw_data_backup"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
