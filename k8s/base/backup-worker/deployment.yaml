apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-worker
  template:
    metadata:
      labels:
        app: backup-worker
    spec:
      serviceAccountName: backup-worker
      containers:
        - name: backup-worker
          image: backup-worker
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: JAEGER_ENDPOINT
              value: "localhost:4317"
          envFrom:
            - configMapRef:
                name: backup-worker-config
            - secretRef:
                name: backup-worker
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f raw-data-backup"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
