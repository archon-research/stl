apiVersion: apps/v1
kind: Deployment
metadata:
  name: cex-orderbook-indexer-kraken
spec:
  # One pod per exchange (single persistent WebSocket connection group). The book
  # is rebuilt from a fresh snapshot on restart, so a second replica would only
  # duplicate writes — keep it at 1.
  replicas: 1
  selector:
    matchLabels:
      app: cex-orderbook-indexer-kraken
  template:
    metadata:
      labels:
        app: cex-orderbook-indexer-kraken
    spec:
      serviceAccountName: cex-orderbook-indexer-kraken
      containers:
        - name: cex-orderbook-indexer-kraken
          # Image name is the Kustomize images-transformer key; the overlay sets
          # newName + newTag. All three exchange pods share one binary, selected at
          # runtime by EXCHANGE.
          image: cex-orderbook-indexer
          envFrom:
            - configMapRef:
                name: otel-config
            - configMapRef:
                name: cex-orderbook-indexer-kraken-config
            - secretRef:
                name: cex-orderbook-indexer-kraken
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              # 500m, not the fleet's usual 200m: the staging headroom test (VEC-380)
              # showed this pod CPU-throttled at 200m (per-frame sorts).
              # okx stays at 200m — it idles at single-digit millicores.
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f cex-orderbook-indexer"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
