apiVersion: apps/v1
kind: Deployment
metadata:
  name: unichain-watcher
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unichain-watcher
  template:
    metadata:
      labels:
        app: unichain-watcher
    spec:
      serviceAccountName: unichain-watcher
      containers:
        - name: unichain-watcher
          # Image name used as the Kustomize images transformer key.
          # The overlay kustomization.yaml overrides newName + newTag.
          image: unichain-watcher
          args: ["--enable-traces=false"]
          envFrom:
            - configMapRef:
                name: otel-config
            - configMapRef:
                name: unichain-watcher-config
            - secretRef:
                # Populated by ExternalSecret — secret name mirrors the service.
                name: unichain-watcher
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f watcher"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
