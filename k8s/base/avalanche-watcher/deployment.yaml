apiVersion: apps/v1
kind: Deployment
metadata:
  name: avalanche-watcher
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: avalanche-watcher
  template:
    metadata:
      labels:
        app: avalanche-watcher
    spec:
      serviceAccountName: avalanche-watcher
      containers:
        - name: avalanche-watcher
          # Image name used as the Kustomize images transformer key.
          # The overlay kustomization.yaml overrides newName + newTag.
          image: avalanche-watcher
          args: ["--enable-traces=false"]
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: JAEGER_ENDPOINT
              value: "localhost:4317"
          envFrom:
            - configMapRef:
                name: avalanche-watcher-config
            - secretRef:
                # Populated by ExternalSecret — secret name mirrors the service.
                name: avalanche-watcher
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f watcher"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
