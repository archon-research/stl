apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-debt-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prime-debt-indexer
  template:
    metadata:
      labels:
        app: prime-debt-indexer
    spec:
      serviceAccountName: prime-debt-indexer
      initContainers:
        - name: migrate
          image: prime-debt-indexer
          command: ["/app/migrate"]
          envFrom:
            - configMapRef:
                name: prime-debt-indexer
            - secretRef:
                name: prime-debt-indexer
      containers:
        - name: prime-debt-indexer
          # Image name used as the Kustomize images transformer key.
          # The overlay kustomization.yaml overrides newName + newTag.
          image: prime-debt-indexer
          envFrom:
            - configMapRef:
                name: prime-debt-indexer
            - secretRef:
                # Populated by ExternalSecret — secret name mirrors the service.
                name: prime-debt-indexer
          resources:
            requests:
              cpu: "1000m"
              memory: "2048Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f prime-debt-indexer"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
