apiVersion: apps/v1
kind: Deployment
metadata:
  name: cex-orderbook-indexer-okx
spec:
  # One pod per exchange (single persistent WebSocket connection group). The book
  # is rebuilt from a fresh snapshot on restart, so a second replica would only
  # duplicate writes — keep it at 1.
  replicas: 1
  selector:
    matchLabels:
      app: cex-orderbook-indexer-okx
  template:
    metadata:
      labels:
        app: cex-orderbook-indexer-okx
    spec:
      serviceAccountName: cex-orderbook-indexer-okx
      containers:
        - name: cex-orderbook-indexer-okx
          # Image name is the Kustomize images-transformer key; the overlay sets
          # newName + newTag. All three exchange pods share one binary, selected at
          # runtime by EXCHANGE.
          image: cex-orderbook-indexer
          envFrom:
            - configMapRef:
                name: otel-config
            - configMapRef:
                name: cex-orderbook-indexer-okx-config
            - secretRef:
                name: cex-orderbook-indexer-okx
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f cex-orderbook-indexer"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
