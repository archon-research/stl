apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-price-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-price-worker
  template:
    metadata:
      labels:
        app: oracle-price-worker
    spec:
      serviceAccountName: oracle-price-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: oracle-price-worker
          image: oracle-price-worker
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: oracle-price-worker
          resources:
            requests:
              cpu: "1000m"
              memory: "2048Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f oracle_price_worker"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
