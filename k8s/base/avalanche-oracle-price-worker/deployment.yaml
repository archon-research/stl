apiVersion: apps/v1
kind: Deployment
metadata:
  name: avalanche-oracle-price-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avalanche-oracle-price-worker
  template:
    metadata:
      labels:
        app: avalanche-oracle-price-worker
    spec:
      serviceAccountName: avalanche-oracle-price-worker
      containers:
        - name: avalanche-oracle-price-worker
          # Distinct image key — overlay maps this to the oracle-price-worker ECR repo.
          # Same binary as oracle-price-worker; chain is selected via CHAIN_ID env var.
          image: avalanche-oracle-price-worker
          envFrom:
            - configMapRef:
                name: otel-config
            - configMapRef:
                name: avalanche-oracle-price-worker-config
            - secretRef:
                name: avalanche-oracle-price-worker
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f oracle_price_worker"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
