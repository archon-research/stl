apiVersion: apps/v1
kind: Deployment
metadata:
  name: morpho-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: morpho-indexer
  template:
    metadata:
      labels:
        app: morpho-indexer
    spec:
      serviceAccountName: morpho-indexer
      containers:
        - name: morpho-indexer
          image: morpho-indexer
          envFrom:
            - configMapRef:
                name: otel-config
            - configMapRef:
                name: morpho-indexer-config
            - secretRef:
                name: morpho-indexer
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f morpho"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
