# ExternalSecrets for staging — pulls from sentinelstaging AWS Secrets Manager
# Each creates a K8s Secret matching the service name, consumed via envFrom.secretRef
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: watcher
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: watcher
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ALCHEMY_API_KEY
      remoteRef:
        key: stl-sentinelstaging-alchemy-api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DATABASE_URL
      remoteRef:
        key: stl-sentinelstaging-tigerdata-app
        property: pooler_url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: REDIS_ADDR
      remoteRef:
        key: stl-sentinelstaging-infra-config
        property: ethereum_redis_addr
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: AWS_SNS_TOPIC_ARN
      remoteRef:
        key: stl-sentinelstaging-infra-config
        property: ethereum_sns_topic_arn
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
