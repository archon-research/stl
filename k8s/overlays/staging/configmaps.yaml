# ConfigMaps for staging — non-secret environment variables matching ECS parity
# REDIS_ADDR values must be filled from: tofu output -raw module.ethereum.redis_endpoint / module.avalanche.redis_endpoint
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-config
data:
  CHAIN_ID: "1"
  ALCHEMY_HTTP_URL: "https://eth-mainnet.g.alchemy.com/v2"
  ALCHEMY_WS_URL: "wss://eth-mainnet.g.alchemy.com/v2"
  AWS_REGION: "eu-west-1"
  AWS_SNS_TOPIC_ARN: "arn:aws:sns:eu-west-1:579039992622:stl-sentinelstaging-ethereum-blocks.fifo"
  AWS_SNS_ENDPOINT: "https://sns.eu-west-1.amazonaws.com"
  REDIS_ADDR: "REPLACE_ME:6379"
  ENVIRONMENT: "sentinelstaging"
  ENABLE_BACKFILL: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-worker-config
