# ExternalSecrets for prod — pulls from sentinelprod AWS Secrets Manager
# Each creates a K8s Secret matching the service name, consumed via envFrom.secretRef
# Exception: `migrate` is a shared secret used by all migration initContainers
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: watcher
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: watcher
    creationPolicy: Owner
  data:
    - secretKey: ALCHEMY_API_KEY
      remoteRef:
        key: stl-sentinelprod-alchemy-api-key
    - secretKey: DATABASE_URL
      remoteRef:
        key: stl-sentinelprod-tigerdata-app
        property: pooler_url
    - secretKey: REDIS_ADDR
      remoteRef:
        key: stl-sentinelprod-infra-config
        property: ethereum_redis_addr
    - secretKey: AWS_SNS_TOPIC_ARN
      remoteRef:
        key: stl-sentinelprod-infra-config
        property: ethereum_sns_topic_arn
---
