  - name: offchain-price-indexer
    newName: 030797368798.dkr.ecr.eu-west-1.amazonaws.com/stl-sentinelprod-cronjob
    newTag: "offchain-price-indexer-6482c3f92a1c13e38a7ff3780514519fbbf51d7e"
