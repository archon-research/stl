apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vector

# TEMPORARY (VEC-499 incident): the avalanche-allocation-tracker is 100% erroring
# — its periodic sweep does an on-chain decimals() read of the GACLO-1 CLO's
# underlying (mainnet USDC, 0xA0b8…) on Avalanche C-Chain, where that address has
# no code, which fails the whole sweep and stalls the chain. Scaled to 0 to stop
# the alert churn while the cross-chain-underlying fix lands. Revert (or remove
# this override) once the tracker is fixed.
replicas:
  - name: avalanche-allocation-tracker
    count: 0

resources:
  - ../../base/watcher
  - ../../base/backup-worker
  - ../../base/oracle-price-worker
  - ../../base/sparklend-position-tracker
  - ../../base/morpho-indexer
  # curve-indexer + uniswap-v3-indexer run the shared dex-indexer image, one
  # Deployment per DEX (DEX env selects the factory). VEC-329.
  - ../../base/curve-indexer
  - ../../base/uniswap-v3-indexer
  - ../../base/fluid-vault-indexer
  - ../../base/allocation-tracker
  - ../../base/avalanche-watcher
  - ../../base/avalanche-backup-worker
  - ../../base/avalanche-sparklend-position-tracker
  - ../../base/avalanche-oracle-price-worker
  - ../../base/avalanche-allocation-tracker
  - ../../base/base-watcher
  - ../../base/base-backup-worker
  - ../../base/base-allocation-tracker
  - ../../base/base-oracle-price-worker
  - ../../base/optimism-watcher
  - ../../base/optimism-backup-worker
  - ../../base/unichain-watcher
  - ../../base/unichain-backup-worker
  - ../../base/arbitrum-watcher
  - ../../base/arbitrum-backup-worker
  - ../../base/prime-debt-indexer
  - ../../base/base-psm3-indexer
  - ../../base/optimism-psm3-indexer
  - ../../base/unichain-psm3-indexer
  - ../../base/arbitrum-psm3-indexer
  - ../../base/spark-anchorage-indexer
  - ../../base/offchain-price-indexer
  - ../../base/maple-graphql-indexer
  # CEX L2 order book indexer fleet — one pod per exchange, same binary,
  # different EXCHANGE/SYMBOLS config (mirrors the staging fleet, VEC-374/VEC-380).
  - ../../base/cex-orderbook-indexer-coinbase
  - ../../base/cex-orderbook-indexer-okx
  - ../../base/cex-orderbook-indexer-kraken
  - ../../base/watcher-data-validator
  - ../../base/optimism-watcher-data-validator
  - ../../base/unichain-watcher-data-validator
  - ../../base/base-watcher-data-validator
  - ../../base/arbitrum-watcher-data-validator
  - ../../base/avalanche-watcher-data-validator
  - ../../base/transform-worker
  - ../../base/migrate
  - ../../base/python-api
  - external-secrets.yaml
  - configmaps.yaml

# IAM bindings are managed via EKS Pod Identity associations in the infra repo (SEN-230).
# No annotations needed on ServiceAccounts.

