# Manual-apply overlay for the one-off transform-bootstrap Job (VEC-490).
# NOT referenced by ../kustomization.yaml, so ArgoCD never syncs or auto-runs it.
# Run once, by hand, after the transform-worker is deployed:
#   kustomize build k8s/overlays/prod/bootstrap | kubectl apply -f -
# Set newTag to the currently deployed transform-bootstrap image and edit -from in
# the base Job for the window.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vector

resources:
  - ../../../base/transform-bootstrap

images:
  - name: transform-bootstrap
    newName: 030797368798.dkr.ecr.eu-west-1.amazonaws.com/stl-sentinelprod-cronjob
    newTag: "transform-bootstrap-c92be2379ea1a366a5825a7c79b7efba91e7dfe0"
