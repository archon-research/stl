# curve-indexer + uniswap-v3-indexer run the shared dex-indexer binary; the DEX
# key selects the factory. No SC-call archiving (dexbootstrap does not wire the
# archiving decorator). SQS queue URL, DB, Redis, Alchemy key come from the
# matching ExternalSecret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: curve-indexer-config
data:
  DEX: "curve"
  CHAIN_ID: "1"
  AWS_REGION: "eu-west-1"
  ALCHEMY_HTTP_URL: "https://eth-mainnet.g.alchemy.com/v2"
  ENVIRONMENT: "sentinelprod"
