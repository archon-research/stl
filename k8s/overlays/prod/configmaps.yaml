# ConfigMaps for prod — non-secret environment variables matching ECS parity
# Sensitive values (Redis, SQS, S3, SNS) are in ExternalSecrets via stl-sentinelprod-infra-config
---
# Shared OpenTelemetry configuration — all services reference this via envFrom.
# Points to the OTel Collector gateway in the observability namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317"
  JAEGER_ENDPOINT: "otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-config
data:
  CHAIN_ID: "1"
  ALCHEMY_HTTP_URL: "https://eth-mainnet.g.alchemy.com/v2"
  ALCHEMY_WS_URL: "wss://eth-mainnet.g.alchemy.com/v2"
  AWS_REGION: "eu-west-1"
  AWS_SNS_ENDPOINT: "https://sns.eu-west-1.amazonaws.com"
  ENVIRONMENT: "sentinelprod"
  ENABLE_BACKFILL: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-worker-config
data:
  CHAIN_ID: "1"
  AWS_REGION: "eu-west-1"
  WORKERS: "4"
  DEPLOY_ENV: "prod"
  ENVIRONMENT: "sentinelprod"
