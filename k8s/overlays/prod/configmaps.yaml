  TEMPORAL_NAMESPACE: "vector"
  CHAIN_ID: "1"
  MAPLE_SYNC_INTERVAL: "10m"
  MAPLE_GRAPHQL_ENDPOINT: "https://api.maple.finance/v2/graphql"
  ENVIRONMENT: "sentinelprod"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-data-validator
data:
  TEMPORAL_HOST_PORT: "temporal-server.temporal:7233"
  TEMPORAL_NAMESPACE: "vector"
  CHAIN_ID: "1"
  DATA_VALIDATION_SCHEDULE_OFFSET: "0s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: transform-worker
data:
  TEMPORAL_HOST_PORT: "temporal-server.temporal:7233"
  TEMPORAL_NAMESPACE: "vector"
  # Drain cadence; the worker defaults to 10m if unset. Not chain-specific, so
  # no CHAIN_ID (the worker drains every source in transformed._sources).
  TRANSFORM_INTERVAL: "10m"
  # Phase the 10m tick off the boundary-aligned producers (maple-graphql-indexer
  # 10m, offchain-price-indexer 5m) so producer writes do not coincide with the
  # queue drains, transformed upserts and parity reads.
  TRANSFORM_SCHEDULE_OFFSET: "2m"
