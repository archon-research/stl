# =============================================================================
# Vector — Postgres / TimescaleDB health alerts
# =============================================================================
# Lead-indicator alerts for the database the indexers write to. The 2026-06-18
# staging incident was a lock convoy: an external tool (OpenMetadata data-quality
# workflow) left transactions `idle in transaction` for hours, holding
# AccessShareLock on hypertable chunks. TimescaleDB columnstore/compression jobs
# then queued AccessExclusiveLock behind them, and Postgres lock-queue semantics
# made every later request (including the indexers' reads) wait behind the
# pending strong lock. The indexers had no statement/lock/context timeout, so
# they hung indefinitely and the SQS queues backed up.
#
# A long-lived `idle in transaction` session is the earliest detectable signal
# of that failure mode — it fires hours before the downstream indexer-stall
# alert (VectorMorphoIndexerStalled / VectorOracleIndexerStalled) and points
# straight at the cause.
#
# Metric source: Timescale Cloud exporter (job="tigerdata"). Series carry:
#   - cluster="archon-prod" | "archon-staging"
#   - service_id  (Timescale service: ucpymqz73b=prod, xd7na17213=staging)
#   - role="primary" | "replica"
#   - state  (pg_stat_activity backend state)
# `cluster`/`service_id` are preserved through `max by (...)` so the Alertmanager
# Slack template's `Cluster:` header is populated. No static `cluster`/`env`
# labels in the rule's labels block (FORBIDDEN_LABELS in the mimir-rules-sync
# lint); cluster is only matched in the expr against the metric's own label.
#
# Per-env pinning (2026-06-19): each rule is scoped to its (cluster, service_id)
# pair instead of trusting `cluster` alone, because the exporter topology is
# currently wrong (see docs/runbooks/vector-postgres.md "Metrics coverage"):
#   - The staging DB (xd7na17213) exports NO metrics yet. Staging coverage
#     activates automatically once infra enables its Timescale Cloud metrics
#     export labelled cluster=archon-staging.
#   - The prod DB (ucpymqz73b) metrics are also ingested into the staging Grafana
#     stack mislabelled cluster=archon-staging. Pinning the prod rule to
#     cluster="archon-prod" stops prod idle-tx from paging as a staging alert;
#     pinning the staging rule to service_id="xd7na17213" keeps it immune to that
#     leak. Relax the service_id pins once the infra topology is fixed.
# =============================================================================
groups:
  - name: vector-postgres
    interval: 1m
    rules:
      # ---------------------------------------------------------------------
      # WARNING — a transaction has been idle-in-transaction long enough to
      # threaten compression and writers. Catch it before indexers stall.
      # ---------------------------------------------------------------------
      - alert: PostgresLongIdleInTransaction
        expr: |
          max by (cluster, service_id, role) (
            pg_stat_activity_max_tx_duration{state=~"idle in transaction.*", cluster="archon-prod",    service_id="ucpymqz73b"}
            or
            pg_stat_activity_max_tx_duration{state=~"idle in transaction.*", cluster="archon-staging", service_id="xd7na17213"}
          ) > 300
        for: 2m
        labels:
          team: vector
          severity: warning
          component: timescaledb
          namespace: vector
        annotations:
          summary: "Idle-in-transaction > 5m on {{ $labels.cluster }} DB ({{ $labels.service_id }}/{{ $labels.role }})"
          description: >
            A session has held a transaction open and idle for over 5 minutes.
            Idle-in-transaction sessions hold locks that block TimescaleDB
            compression and, transitively, indexer reads/writes (2026-06-18
            lock-convoy incident). Identify it:
            SELECT pid, usename, client_addr, state, now()-xact_start AS age,
            left(query,120) FROM pg_stat_activity
            WHERE state LIKE 'idle in transaction%' ORDER BY xact_start;
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-postgres.md#postgreslongidleintransaction

      # ---------------------------------------------------------------------
      # CRITICAL — sustained long enough that indexer impact is imminent.
      # ---------------------------------------------------------------------
      - alert: PostgresLongIdleInTransactionCritical
        expr: |
          max by (cluster, service_id, role) (
            pg_stat_activity_max_tx_duration{state=~"idle in transaction.*", cluster="archon-prod",    service_id="ucpymqz73b"}
            or
            pg_stat_activity_max_tx_duration{state=~"idle in transaction.*", cluster="archon-staging", service_id="xd7na17213"}
          ) > 900
        for: 1m
        labels:
          team: vector
          severity: critical
          component: timescaledb
          namespace: vector
        annotations:
          summary: "Idle-in-transaction > 15m on {{ $labels.cluster }} DB ({{ $labels.service_id }}/{{ $labels.role }})"
          description: >
            An idle-in-transaction session has persisted 15m+. This is the
            precondition for the indexer lock-convoy stall. Terminate the
            offending backend (pg_terminate_backend) once identified, and
            confirm idle_in_transaction_session_timeout is set on its role.
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-postgres.md#postgreslongidleintransactioncritical
