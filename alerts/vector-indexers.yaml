# =============================================================================
# Vector — indexer alerts (ADR-008 / ORB-200)
# =============================================================================
# The morpho and oracle indexers consume blocks from the watcher pipeline and
# derive product state (positions, prices) into TimescaleDB. They're the last
# hop before downstream readers see data, so stalls / errors here translate
# directly into stale customer views.
#
# Two indexers in v1 (morpho, oracle). Each gets its own rules because the
# Slack-thread spec uses distinct per-indexer metric prefixes
# (`morpho_blocks_processed_total`, `oracle_blocks_processed_total`). Once
# the services are unified onto a single metric name with an `indexer` label,
# these can collapse into a single rule per signal.
#
# Metric source: OTel SDK in each indexer. Series carry:
#   - service_name="morpho-indexer" | "oracle-price-worker"
#   - k8s_namespace_name="vector"
#   - cluster="archon-prod" | "archon-staging"  (OTel gateway resource processor)
#   - chain (for multi-chain indexers)
#
# `cluster` is propagated from the source metric (preserved through `sum by`)
# so the Alertmanager Slack template's `Cluster:` header is populated.
# `namespace` is set as a static rule label since every rule here filters to
# `k8s_namespace_name="vector"`. The mimir-rules-sync lint forbids `cluster`
# and `env` as static rule labels (FORBIDDEN_LABELS) but allows `namespace`.
# =============================================================================
groups:
  - name: vector-indexers
    interval: 1m
    rules:
      # ---------------------------------------------------------------------
      # CRITICAL — page-worthy
      # ---------------------------------------------------------------------

      - alert: VectorMorphoIndexerStalled
        expr: |
          sum by (chain, cluster) (
            rate(morpho_blocks_processed_total{k8s_namespace_name="vector"}[5m])
          ) == 0
        for: 15m
        labels:
          team: vector
          severity: critical
          component: morpho-indexer
          namespace: vector
        annotations:
          summary: "Vector morpho-indexer stalled on {{ $labels.chain }}"
          description: |
            `morpho-indexer` on chain `{{ $labels.chain }}` has not
            advanced for >15m. Morpho position state in TimescaleDB will
            go stale.
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-indexers.md#vectormorphoindexerstalled

      - alert: VectorOracleIndexerStalled
        expr: |
          sum by (chain, cluster) (
            rate(oracle_blocks_processed_total{k8s_namespace_name="vector"}[5m])
          ) == 0
        for: 15m
        labels:
          team: vector
          severity: critical
          component: oracle-indexer
          namespace: vector
        annotations:
          summary: "Vector oracle-indexer stalled on {{ $labels.chain }}"
          description: |
            `oracle-price-worker` on chain `{{ $labels.chain }}` has not
            advanced for >15m. Oracle price state in TimescaleDB will go
            stale.
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-indexers.md#vectororacleindexerstalled

      # ---------------------------------------------------------------------
      # WARNING
      # ---------------------------------------------------------------------

      - alert: VectorMorphoIndexerErrorsHigh
        expr: |
          sum by (chain, cluster) (
            rate(morpho_errors_total{k8s_namespace_name="vector"}[10m])
          ) > 0.1
        for: 15m
        labels:
          team: vector
          severity: warning
          component: morpho-indexer
          namespace: vector
        annotations:
          summary: "Vector morpho-indexer error rate >0.1/s on {{ $labels.chain }}"
          description: |
            `morpho-indexer` on chain `{{ $labels.chain }}` is throwing
            `{{ $value | printf "%.2f" }}` errors/s over 15m. Investigate
            pod logs before this turns into a stall.

      - alert: VectorOracleIndexerErrorsHigh
        expr: |
          sum by (chain, cluster) (
            rate(oracle_errors_total{k8s_namespace_name="vector"}[10m])
          ) > 0.1
        for: 15m
        labels:
          team: vector
          severity: warning
          component: oracle-indexer
          namespace: vector
        annotations:
          summary: "Vector oracle-indexer error rate >0.1/s on {{ $labels.chain }}"
          description: |
            `oracle-price-worker` on chain `{{ $labels.chain }}` is throwing
            `{{ $value | printf "%.2f" }}` errors/s over 15m. Investigate
            pod logs before this turns into a stall.

      - alert: VectorMorphoIndexerRPCLatencyHigh
        # Indexer RPC latency >3s p99 for 15m. Indexers query the watcher's
        # archive RPC; sustained high latency means decoding / storage is
        # blocking, or the upstream RPC node is degraded.
        #
        # Histogram `morpho.rpc.duration_seconds` (OTel instrument), exported as
        # `morpho_rpc_duration_seconds_bucket`.
        expr: |
          histogram_quantile(
            0.99,
            sum by (chain, cluster, le) (
              rate(morpho_rpc_duration_seconds_bucket{
                k8s_namespace_name="vector"
              }[10m])
            )
          ) > 3
        for: 15m
        labels:
          team: vector
          severity: warning
          component: morpho-indexer
          namespace: vector
        annotations:
          summary: "Vector morpho-indexer p99 RPC latency >3s on {{ $labels.chain }}"
          description: |
            `morpho-indexer` on chain `{{ $labels.chain }}` p99 RPC
            latency is `{{ $value | printf "%.2fs" }}` over 15m. Indexer is
            degraded; expect lag in downstream Morpho position state.

      - alert: VectorOracleIndexerRPCLatencyHigh
        # See VectorMorphoIndexerRPCLatencyHigh — same shape, different
        # metric prefix. Histogram `oracle.rpc.duration_seconds`.
        expr: |
          histogram_quantile(
            0.99,
            sum by (chain, cluster, le) (
              rate(oracle_rpc_duration_seconds_bucket{
                k8s_namespace_name="vector"
              }[10m])
            )
          ) > 3
        for: 15m
        labels:
          team: vector
          severity: warning
          component: oracle-indexer
          namespace: vector
        annotations:
          summary: "Vector oracle-indexer p99 RPC latency >3s on {{ $labels.chain }}"
          description: |
            `oracle-price-worker` on chain `{{ $labels.chain }}` p99 RPC
            latency is `{{ $value | printf "%.2fs" }}` over 15m. Indexer is
            degraded; expect lag in downstream oracle price state.

      # ---------------------------------------------------------------------
      # Raw SC call archiving (VEC-364 / PR #399)
      # ---------------------------------------------------------------------
      # archive_writes_total{status,source,chain,service_name} is emitted by the
      # archiving decorator; archive_object_size_bytes is the S3 adapter's
      # compressed-object-size histogram. Both only exist for binaries with
      # ARCHIVE_SC_CALLS=true, so a disabled source has no series and never fires.

      - alert: VectorArchivingStalled
        # No successful S3 archive writes for 10m while the indexer is still
        # executing multicalls. multicall_batch_size_count increments on the same
        # Execute path that archives, so writes==0 with multicalls>0 is a genuine
        # archiving failure, not an idle/disabled source (those have no archive
        # series, or no multicalls, so the guard or the ==0 match excludes them).
        expr: |
          sum by (service_name, chain, cluster) (
            increase(archive_writes_total{status="success", k8s_namespace_name="vector"}[10m])
          ) == 0
          and on (service_name, chain, cluster)
          sum by (service_name, chain, cluster) (
            increase(multicall_batch_size_count{k8s_namespace_name="vector"}[10m])
          ) > 0
        for: 5m
        labels:
          team: vector
          severity: warning
          component: archiving
          namespace: vector
        annotations:
          summary: "Vector archiving stalled for {{ $labels.service_name }} on {{ $labels.chain }}"
          description: |
            `{{ $labels.service_name }}` on chain `{{ $labels.chain }}` is still
            executing multicalls but has written no raw SC call archives to S3 for
            >10m. Replay data is being lost (Alchemy remains the fallback).

      - alert: VectorArchivingEmptyObjects
        # Any archived object lands in the smallest size bucket (<=64B). A real
        # one-call zstd object is comfortably larger, so this signals degenerate
        # / near-empty writes. Depends on archive_object_size_bytes (sibling task),
        # so it stays dormant until that metric is deployed.
        expr: |
          sum by (service_name, chain, cluster) (
            increase(archive_object_size_bytes_bucket{le="64", k8s_namespace_name="vector"}[10m])
          ) > 0
        for: 5m
        labels:
          team: vector
          severity: warning
          component: archiving
          namespace: vector
        annotations:
          summary: "Vector archiving wrote near-empty objects for {{ $labels.service_name }} on {{ $labels.chain }}"
          description: |
            `{{ $labels.service_name }}` on chain `{{ $labels.chain }}` wrote one or
            more archived objects <=64 bytes in the last 10m. Inspect the object
            and the encode path; the file is likely missing call/response data.
