# =============================================================================
# Vector — RPC transport alerts (rpchttp retry transport)
# =============================================================================
# Every worker that dials Ethereum RPC via internal/pkg/rpchttp.DialEthereum
# (oracle / morpho / sparklend / prime / psm3 indexers, dex bootstrap, and the
# backfillers via NewBackfillerClient) shares one retry transport. It retries
# HTTP 429 / 5xx / network errors with capped exponential backoff, and now
# emits transport-level telemetry:
#
#   rpc_http_attempts_total{server_address,rpc_http_status_code}  (every attempt)
#   rpc_http_retries_total{server_address,reason}                 (each retry: 429|5xx|network)
#
# These sit BELOW the per-service logical-RPC metrics (e.g.
# oracle_rpc_duration_seconds): a single slow logical call times the whole
# client.Do including silent backoff, so a high retry ratio here is what
# attributes that latency tail to upstream throttling (429) vs server errors
# (5xx) vs flaky connections (network).
#
# Metric source: OTel SDK in each worker. Series carry:
#   - service_name=<worker>        (OTel service.name)
#   - server_address=<rpc host>    (e.g. avax-mainnet.g.alchemy.com; no API key — key is a path segment)
#   - k8s_namespace_name="vector"
#   - cluster="archon-prod" | "archon-staging"  (OTel gateway resource processor)
#
# `cluster` is preserved through `sum by (...)` so the Alertmanager Slack
# template's `Cluster:` header is populated. `namespace` is a static rule label
# (mimir-rules-sync lint forbids `cluster`/`env` as static labels but allows it).
#
# Severity → routing (per the alerting routing spec):
#   warning → no page, [WARNING], 4h repeat.
# =============================================================================
groups:
  - name: vector-rpc
    interval: 1m
    rules:
      # -----------------------------------------------------------------------
      # WARNING — a large fraction of RPC attempts are being retried
      # -----------------------------------------------------------------------
      - alert: VectorRPCRetryRatioHigh
        # Retries / attempts > 20% over 10m for a (service, rpc host) pair. The
        # transport masks upstream flakiness as latency, so a high ratio is the
        # leading indicator of the throttle-driven latency tail (e.g.
        # VectorOracleIndexerRPCLatencyHigh). clamp_min avoids divide-by-zero
        # when a worker briefly issues no attempts (ratio → 0, never fires).
        # Below 20% is normal transient-retry noise.
        expr: |
          sum by (service_name, server_address, cluster) (
            rate(rpc_http_retries_total{k8s_namespace_name="vector"}[10m])
          )
          /
          clamp_min(
            sum by (service_name, server_address, cluster) (
              rate(rpc_http_attempts_total{k8s_namespace_name="vector"}[10m])
            ),
            0.001
          )
          > 0.2
        for: 15m
        labels:
          team: vector
          severity: warning
          component: rpc-transport
          namespace: vector
        annotations:
          summary: "Vector RPC retry ratio >20% for {{ $labels.service_name }} → {{ $labels.server_address }}"
          description: |
            `{{ $labels.service_name }}` is retrying
            `{{ $value | humanizePercentage }}` of its RPC attempts to
            `{{ $labels.server_address }}` over 10m. The transport is masking
            upstream 429/5xx/network failures as added latency; break down by
            `reason` on `rpc_http_retries_total` to tell throttling (429) from
            server errors (5xx) from flaky connections (network).
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-rpc.md#vectorrpcretryratiohigh
