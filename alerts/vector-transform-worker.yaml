# =============================================================================
# Vector — transformation-layer worker alerts (VEC-484)
# =============================================================================
# The transform-worker cronjob drains a per-source change queue
# (transformed._pending_<t>) into the transformed hypertables. Generic
# run-failure and worker-liveness are already covered for every cronjob by
# vector-cronjobs.yaml (service_name="transform-worker"); these rules add the
# silent-failure case that path can't see: the worker is up and its runs
# "succeed", but a source's queue stops draining, so the transformed table
# silently falls behind raw.
#
# Signal: transform.queue.oldest_age_seconds (OTel gauge), exported as
#   transform_queue_oldest_age_seconds{table="<source>"}
# recorded once per tick from transformed._queue_status. It is the seconds since
# the oldest un-drained row was enqueued, so it grows only when a source is not
# keeping up; it is ~0 when the queue drains each tick. transform_queue_pending
# is the companion depth gauge (dashboards / triage).
#
# A dead worker (gauge goes stale) is covered by VectorCronjobWorkerDown in
# vector-cronjobs.yaml, so these rules deliberately target "up but not draining".
#
# Series carry service_name="transform-worker", k8s_namespace_name="vector",
# cluster=archon-prod|archon-staging (preserved through sum/max by for the Slack
# Cluster: header). Severity → routing per the alerting routing spec:
#   critical       → pages, [CRITICAL], 1h repeat.
#   warning        → no page, [WARNING], 4h repeat.
# =============================================================================
groups:
  - name: vector-transform-worker
    interval: 60s
    rules:
      # -----------------------------------------------------------------------
      # WARNING — a source's queue is lagging (draining slower than it fills)
      # -----------------------------------------------------------------------
      - alert: VectorTransformQueueLagging
        # Oldest un-drained row for some source is older than 30m for 15m. In
        # steady state the queue drains every tick (default 10m), so a sustained
        # 30m age means that source is falling behind.
        expr: |
          max by (table, cluster) (
            transform_queue_oldest_age_seconds{
              service_name="transform-worker",
              k8s_namespace_name="vector"
            }
          ) > 1800
        for: 15m
        labels:
          team: vector
          severity: warning
          component: transform-worker
          namespace: vector
        annotations:
          summary: "Transform queue for `{{ $labels.table }}` is lagging"
          description: |
            The oldest un-drained row in `transformed._pending_{{ $labels.table }}`
            has been waiting `{{ $value | humanizeDuration }}`. The worker is
            running but this source is not draining each tick. Check the
            transform-worker logs and `transformed._queue_status`; if it keeps
            climbing, VectorTransformQueueStalled will page.
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-transform-worker.md#vectortransformqueuelagging

      # -----------------------------------------------------------------------
      # CRITICAL — a source's queue is stalled (transformed layer going stale)
      # -----------------------------------------------------------------------
      - alert: VectorTransformQueueStalled
        # Oldest un-drained row older than 2h for 30m: the transformed table for
        # this source is materially behind raw and not recovering.
        expr: |
          max by (table, cluster) (
            transform_queue_oldest_age_seconds{
              service_name="transform-worker",
              k8s_namespace_name="vector"
            }
          ) > 7200
        for: 30m
        labels:
          team: vector
          severity: critical
          component: transform-worker
          namespace: vector
        annotations:
          summary: "Transform queue for `{{ $labels.table }}` is stalled"
          description: |
            The oldest un-drained row in `transformed._pending_{{ $labels.table }}`
            has been waiting `{{ $value | humanizeDuration }}`. `transformed.{{ $labels.table }}`
            is materially behind raw. The worker is up (else VectorCronjobWorkerDown
            fires), so the drain itself is failing or wedged — check the
            transform-worker error logs and for a stuck `transformed._run_{{ $labels.table }}()`.
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-transform-worker.md#vectortransformqueuestalled
