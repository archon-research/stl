# =============================================================================
# Vector — CEX order book indexer alerts (VEC-374)
# =============================================================================
# The cex-orderbook-indexer streams L2 order books from an exchange over a
# WebSocket and persists periodic top-N snapshots into TimescaleDB. One pod per
# exchange (service_name="cex-orderbook-indexer-<exchange>"), each carrying an
# `exchange` attribute on every metric.
#
# Unlike the block-driven indexers there is no SQS queue behind this: a failed
# write has nothing to NACK to, so the service drops the tick and self-heals on
# the next one (a transient DB blip costs one row). That is fine for blips but
# hides a *permanent* failure (auth, missing table) — which fails every tick
# forever while the process stays "healthy". These rules are how that surfaces:
# the service does not self-crash (no service in this repo does), it emits
# signals and we alert on them. See persistTick in the service for the rationale.
#
# Metric source: OTel SDK in the indexer (service) + order book provider adapter.
# Series carry:
#   - service_name="cex-orderbook-indexer-<exchange>"
#   - exchange="coinbase" | "okx" | "kraken"
#   - k8s_namespace_name="vector"
#   - cluster="archon-prod" | "archon-staging"  (OTel gateway resource processor)
#
# `cluster` is propagated from the source metric (preserved through `sum by`) so
# the Alertmanager Slack template's `Cluster:` header is populated. `namespace`
# is a static rule label (every rule filters k8s_namespace_name="vector"); the
# mimir-rules-sync lint forbids `cluster`/`env` as static labels but allows it.
#
# Severity → routing (per the alerting routing spec):
#   critical       → pages (Grafana IRM), prod #at_stl_prod_alerts /
#                    staging #at_stl_staging_alerts, [CRITICAL], 1h repeat.
#   warning / info → no page, prod #at_stl_alerts / staging
#                    #at_stl_staging_alerts, [WARNING]/[INFO], 4h repeat.
# =============================================================================
groups:
  - name: vector-cex-orderbook
    interval: 1m
    rules:
      # ---------------------------------------------------------------------
      # CRITICAL — page-worthy
      # ---------------------------------------------------------------------

      - alert: VectorCexOrderbookPersistFailing
        expr: |
          sum by (exchange, cluster) (
            rate(orderbook_persist_failures_total{k8s_namespace_name="vector"}[10m])
          ) > 0
        for: 15m
        labels:
          team: vector
          severity: critical
          component: cex-orderbook-indexer
          namespace: vector
        annotations:
          summary: "Vector cex-orderbook-indexer failing to persist on {{ $labels.exchange }}"
          description: |
            `cex-orderbook-indexer` for `{{ $labels.exchange }}` has logged a
            snapshot persistence failure on every tick for >15m. The WebSocket
            is likely fine but nothing is reaching TimescaleDB — a silent data
            hole the drop-and-continue path will not self-heal (e.g. auth, a
            missing table, or a saturated DB pool).
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-cex-orderbook.md#vectorcexorderbookpersistfailing

      - alert: VectorCexOrderbookStreamStalled
        expr: |
          max by (exchange, cluster) (
            orderbook_last_update_age{k8s_namespace_name="vector"}
          ) > 120
        for: 10m
        labels:
          team: vector
          severity: critical
          component: cex-orderbook-indexer
          namespace: vector
        annotations:
          summary: "Vector cex-orderbook-indexer stream stalled on {{ $labels.exchange }}"
          description: |
            The oldest symbol on `{{ $labels.exchange }}` has had no order book
            update for >120s sustained over 10m. The feed has silently gone
            dead; persisted snapshots are stale (and stale symbols stop being
            written, so the series goes flat).
          runbook_url: https://github.com/archon-research/stl/blob/main/docs/runbooks/vector-cex-orderbook.md#vectorcexorderbookstreamstalled
