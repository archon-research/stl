# Lefthook configuration for stl-verify
# Install: make install-hooks or lefthook install
# Run manually: lefthook run pre-commit
#
# Extends language-specific configs from python/ and ts/ subdirectories
# Includes stl-verify-specific validation and Go-specific linting

# Use doublestar glob matcher for standard recursive behavior
glob_matcher: doublestar

extends:
  - python/lefthook.yml
  - ts/lefthook.yml

# Excluded patterns for all commands unless overridden
_exclude_dirs: &exclude_dirs 'db/**|k8s/**|docs/**|*.pb.go|vendor/**'

pre-commit:
  parallel: true
  exclude: "bin/**|dist/**"

  commands:
    check-yaml:
      glob: "**/*.{yml,yaml}"
      exclude: *exclude_dirs
      run: |
        if command -v yamllint > /dev/null 2>&1; then
          yamllint {staged_files}
        else
          echo "Warning: yamllint not found, skipping YAML validation. Install yamllint to enable this check."
        fi

    check-json:
      glob: "**/*.json"
      exclude: *exclude_dirs
      run: |
        if ! command -v jq > /dev/null 2>&1; then
          echo "Warning: jq not found, skipping JSON validation. Install jq: brew install jq"
          exit 0
        fi
        for file in {staged_files}; do
          if [ -f "$file" ]; then
            if ! jq . "$file" > /dev/null 2>&1; then
              echo "Invalid JSON: $file"
              exit 1
            fi
          fi
        done

    check-large-files:
      glob: "**/*"
      exclude: *exclude_dirs
      run: |
        for file in {staged_files}; do
          # Skip directories
          [ -d "$file" ] && continue

          # If file is tracked by Git LFS, skip size check
          if git lfs ls-files --error-unmatch "$file" >/dev/null 2>&1; then
            continue
          fi

          # Cross-platform file size (macOS/BSD stat first, then GNU stat)
          size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
          if [ "$size" -gt 1024000 ]; then
            echo "Error: $file is larger than 1000KB ($((size/1024))KB) and not tracked by Git LFS"
            exit 1
          fi
        done

    # =================================================================
    # Go-specific linting
    # =================================================================

    go-fmt:
      glob: "**/*.go"
      exclude: *exclude_dirs
      stage_fixed: true
      run: gofmt -s -w {staged_files}

    go-imports:
      glob: "**/*.go"
      exclude: *exclude_dirs
      stage_fixed: true
      run: |
        GOBIN=$(go env GOPATH)/bin
        $GOBIN/goimports -l -w {staged_files}

    # Catch stray worker / indexer / watcher binaries at the stl-verify/
    # root. Per CLAUDE.md "output to stl/dist" — the canonical build target
    # is `make build-go` / `make build-go-one CMD=cmd/<path>` which puts
    # output in stl-verify/dist/. A bare `go build ./cmd/workers/<name>/...`
    # from this directory drops the binary here at the root, which is
    # gitignored but still wasteful (~30-50MB each) and easy to miss.
    # Failing the hook nudges the workflow toward dist/.
    #
    # Dockerfile.* names are explicitly excluded: Dockerfile.curve-dex-worker
    # matches the *-worker glob but is the legitimate Docker build context.
    no-stray-binaries:
      run: |
        stray=$(find . -maxdepth 1 -type f \
          \( -name '*-worker' -o -name '*-indexer' -o -name 'watcher' \) \
          ! -name 'Dockerfile.*' 2>/dev/null)
        if [ -n "$stray" ]; then
          echo "stray binaries at stl-verify/ root — use 'make build-go-one CMD=...' to build into dist/ instead:"
          echo "$stray" | sed 's/^/  - /'
          echo "remove with: rm$(echo "$stray" | tr '\n' ' ')"
          exit 1
        fi
