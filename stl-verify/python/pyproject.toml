[project]
name = "stl-verify-python"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]",
    "asyncpg",
    "pydantic>=2.0",
    "pydantic-settings",
    "python-dotenv",
    "httpx>=0.28.1",
    "axis-synome[runtime] @ git+ssh://git@github.com/archon-research/next-gen-atlas.git@6259ebc48d10938bba0a077ad6904aecb0fe7176#subdirectory=python/axis_synome",
    "opentelemetry-sdk>=1.41.0,<2",
    "opentelemetry-instrumentation-fastapi>=0.62b0,<1",
    "opentelemetry-instrumentation-sqlalchemy>=0.62b0,<1",
    "opentelemetry-exporter-otlp>=1.41.0,<2",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
    "ruff",
    "testcontainers[postgres]",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["app"]

# Required to allow the git+ssh:// reference for axis-synome while we wait
# for an upstream release containing PR #23 to be published.
[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
