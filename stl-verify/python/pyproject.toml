[project]
name = "stl-verify-python"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]",
    "asyncpg",
    "pydantic>=2.0",
    "pydantic-settings",
    "python-dotenv",
    "httpx>=0.28.1",
    "axis",
]

[tool.uv.sources]
# TODO: Replace git references with published packages once synome-specs and axis-common are on a private registry.
axis = { git = "ssh://git@github.com/archon-research/synome.git", subdirectory = "specs", branch = "baekdahl/move-bad-debt-to-specs" }

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
    "ruff",
    "testcontainers[postgres]",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
