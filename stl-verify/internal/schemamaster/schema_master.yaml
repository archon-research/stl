# TRANSFORMS: the transformation layer rewrites these (rename / cast / fill).
transforms:
  - {table: block_states, column: number, canonical: block_number, action: rename}
  - {table: block_states, column: received_at, canonical: received_at, action: cast, from: int8}
  - {table: maple_ftl_loan_state, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_loan_collateral, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_loan_meta, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_loan_state, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_pool_meta, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_pool_state, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_sky_strategy_meta, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_sky_strategy_state, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: maple_syrup_global_state, column: synced_at, canonical: snapshot_time, action: rename}
  - {table: morpho_market_position, column: timestamp, canonical: block_timestamp, action: rename}
  - {table: morpho_market_state, column: last_update, canonical: last_update_at, action: cast, from: int8}
  - {table: morpho_market_state, column: timestamp, canonical: block_timestamp, action: rename}
  - {table: morpho_vault_position, column: timestamp, canonical: block_timestamp, action: rename}
  - {table: morpho_vault_state, column: timestamp, canonical: block_timestamp, action: rename}
  - {table: offchain_token_price, column: source_id, canonical: source_id, action: cast, from: int2}
  - {table: offchain_token_price, column: timestamp, canonical: snapshot_time, action: rename}
  - {table: onchain_token_price, column: block_version, canonical: block_version, action: cast, from: int2}
  - {table: onchain_token_price, column: oracle_id, canonical: oracle_id, action: cast, from: int2}
  - {table: onchain_token_price, column: timestamp, canonical: block_timestamp, action: rename}
  - {table: prime_debt, column: synced_at, canonical: block_timestamp, action: rename}
  - {table: sparklend_reserve_data, column: decimals, canonical: decimals, action: cast, from: numeric}
  - {table: sparklend_reserve_data, column: last_update_timestamp, canonical: last_update_at, action: cast, from: int8}

# OVERRIDES: sanctioned TYPE exemptions the conformance check honours (accepted_type).
# Semantics/class overrides + derived-column formulas are deferred to the L3 / semantic checks
# that consume them; the conformance check reads only canonical + tables + transforms + these.
overrides:
  - table: build_registry
    column: id
    canonical: id
    accepted_type: int4
    reason: "Infra surrogate key paired with build_id (int4); deliberately int4, exempt from canonical id=int8. Not flagged by the conformance check."
