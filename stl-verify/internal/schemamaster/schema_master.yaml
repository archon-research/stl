# schema_master - the canonical column register (INTENT), read by the CI conformance check.
# Not stored in the database: conformance is verified against information_schema at check time.
# A column that already conforms (canonical name + canonical type) appears NOWHERE here.

# Checked but skipped (not governed by this register yet):
#   migrations - the migrator's own bookkeeping table (never governed)
#   *_ref      - the reference layer (#515), column-level cataloguing is a follow-up
#   curve_*    - the Curve DEX layer, added after this snapshot; cataloguing is a follow-up
#                (the conformance check flagged these as unregistered, exactly as designed)
ignore_tables:
  - migrations
  - asset_class_ref
  - corporate_action_type_ref
  - counterparty_role_ref
  - country_ref
  - credit_rating_ref
  - currency_ref
  - deal_type_ref
  - entity_type_ref
  - industry_group_ref
  - origination_type_ref
  - sector_ref
  - security_subtype_ref
  - security_type_ref
  - curve_cryptoswap_config
  - curve_cryptoswap_state
  - curve_liquidity_event
  - curve_lp_token_event
  - curve_parameter_event
  - curve_pool
  - curve_pool_coin
  - curve_stableswap_config
  - curve_stableswap_state
  - curve_swap

