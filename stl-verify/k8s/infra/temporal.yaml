apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.25.2
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              value: temporal
            - name: POSTGRES_SEEDS
              value: temporal-db
            - name: BIND_ON_IP
              value: 0.0.0.0
            - name: DEFAULT_NAMESPACE
              value: sentinel
          ports:
            - containerPort: 7233
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  type: NodePort
  selector:
    app: temporal
  ports:
    - port: 7233
      targetPort: 7233
      nodePort: 30233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.45.3
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
spec:
  type: NodePort
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30823
