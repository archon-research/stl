apiVersion: batch/v1
kind: Job
metadata:
  name: k6-stress-test
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          env:
            - name: ADMIN_URL
              value: "http://mock-blockchain-server:8547"
            - name: SCENARIO
              value: "${SCENARIO}"
            - name: INTERVAL_MS
              value: "${INTERVAL_MS}"
            - name: DURATION
              value: "${DURATION}"
            - name: REORG
              value: "${REORG}"
            - name: REORG_DEPTH
              value: "${REORG_DEPTH}"
            - name: REORG_INTERVAL_S
              value: "${REORG_INTERVAL_S}"
          command:
            - sh
            - -c
            - k6 run /scripts/watcher-${SCENARIO}.js
          volumeMounts:
            - name: k6-scripts
              mountPath: /scripts
      volumes:
        - name: k6-scripts
          configMap:
            name: k6-scripts
