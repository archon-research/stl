apiVersion: apps/v1
kind: Deployment
metadata:
  name: maple-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maple-indexer
  template:
    metadata:
      labels:
        app: maple-indexer
    spec:
      containers:
        - name: maple-indexer
          image: localhost/stl-maple-indexer:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: stl-config
            - secretRef:
                name: stl-secrets
          env:
            - name: AWS_SQS_QUEUE_URL
              value: http://localstack:4566/000000000000/stl-ethereum-maple-indexing.fifo
