# Dev covers one representative chain (base); PSM3 does not exist on the mainnet chain dev runs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: psm3-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: psm3-indexer
  template:
    metadata:
      labels:
        app: psm3-indexer
    spec:
      containers:
        - name: psm3-indexer
          image: localhost/stl-psm3-indexer:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: stl-config
            - secretRef:
                name: stl-secrets
          env:
            - name: AWS_SQS_QUEUE_URL
              value: http://localstack:4566/000000000000/stl-base-psm3-indexer.fifo
            - name: CHAIN_ID
              value: "8453"
            - name: ALCHEMY_HTTP_URL
              value: https://base-mainnet.g.alchemy.com/v2
            - name: SWEEP_BLOCKS
              value: "300"
