query SparkDeployments($sparkAddress: ID!) {
  account(id: $sparkAddress) {
    id
    poolV2Positions(first: 100) {
      id
      depositedAssets
      lendingBalance
      lendingBalanceUsd
      interestEarned
      interestEarnedUsd
      pool {
        id
        name
        symbol
        asset {
          symbol
          decimals
        }
        liquidityProvided
        totalAssets
        # Active loans are what currently backs the pool
        loans(first: 1000, where: { state_in: [Active] }) {
          id
          name
          amountFunded
          principalOwed
          collateral {
            asset {
              symbol
              decimals
            }
            assetAmount
            assetValueUsd
          }
          collateralAsset {
            symbol
            decimals
          }
          collateralAmount
          state
          stateDetail
        }
      }
    }
  }
}
