rules:
  unpinned-uses:
    config:
      policies:
        "archon-research/github-actions/*": ref-pin
        "*": hash-pin

  # deploy.yaml only runs on push-to-main or workflow_dispatch (both require
  # repo write access), so interpolated values are not attacker-controlled.
  template-injection:
    ignore:
      - deploy.yaml

  # ci.yml: id-token: write must be workflow-level (reusable-workflow callers
  # cannot set job-level permissions). Safe because GitHub blocks OIDC for forks.
  # deploy.yaml: only reached via push-to-main or dispatch; notify jobs inherit
  # caller permissions and cannot be narrowed further on `uses:` jobs.
  excessive-permissions:
    ignore:
      - ci.yml
      - deploy.yaml

  # ci.yml uses `secrets: inherit` for internal reusable workflow calls.
  # The CI sub-workflows don't consume secrets; the deploy workflow does
  # but is gated to push-to-main. Explicit per-secret forwarding adds
  # coupling without meaningful security benefit.
  secrets-inherit:
    ignore:
      - ci.yml
