rules:
  unpinned-uses:
    config:
      policies:
        "archon-research/github-actions/*": ref-pin
        "*": hash-pin

  # deploy.yaml only runs on push-to-main or workflow_dispatch (both require
  # repo write access). The ${{ inputs.sha }}, ${{ github.actor }}, and
  # ${{ steps.changelog.outputs.changelog }} interpolations in run: blocks are
  # not attacker-controlled in these contexts.
  template-injection:
    ignore:
      - deploy.yaml

  # ci.yml: id-token: write at workflow level is required because reusable-
  # workflow callers cannot grant permissions at job level. GitHub blocks OIDC
  # minting for fork PRs, so this is not exploitable.
  # deploy.yaml: only reached via push-to-main or workflow_dispatch. Jobs that
  # call reusable workflows (slack-notify) inherit the caller's permissions;
  # constraining them further would require per-job permissions: {} which
  # cannot be set on `uses:` jobs that need secrets.
  excessive-permissions:
    ignore:
      - ci.yml
      - deploy.yaml
