name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/overlays/staging/kustomization.yaml'
      - 'k8s/overlays/prod/kustomization.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.changed-files.outputs.go_any_changed }}
      python: ${{ steps.changed-files.outputs.python_any_changed }}
      ts: ${{ steps.changed-files.outputs.ts_any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47.0.0
        with:
          files_yaml_from_source_file: .github/changed-files.yml

  go-ci:
    name: Lint, Test & Build
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: stl-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'stl-verify/go.mod'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Install tools
        run: make tools

      - name: Run lint/static checks
        run: make ci-checks

      - name: Run unit tests
        run: make test-race

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::CI modified files. Please run 'make fmt tidy' locally and commit the changes."
            git diff --name-only
            exit 1
          fi

  go-integration:
    name: Integration Tests
    needs:
      - detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: stl-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'stl-verify/go.mod'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Start shared test services
        # Start a single TimescaleDB / Redis / LocalStack instance shared by
        # every integration test package, instead of each package spinning up
        # its own containers via testcontainers. The *ForMain helpers in
        # stl-verify/internal/testutil detect these env vars and skip the
        # per-package container startup. Image tags are kept in sync with
        # internal/testutil/images.go (one source of truth).
        run: |
          set -euo pipefail
          eval "$(grep -E 'Image[A-Za-z0-9_]+\s*=' internal/testutil/images.go \
            | sed -E 's/^[[:space:]]+//; s/[[:space:]]*=[[:space:]]*/=/')"

          # Pull all images in parallel.
          for IMAGE in "$ImageTimescaleDB" "$ImageRedis" "$ImageLocalStack"; do
            docker pull "$IMAGE" &
          done
          wait

          docker network create stl-test || true

          docker run -d --name stl-test-db --network stl-test \
            -e POSTGRES_USER=test -e POSTGRES_PASSWORD=test -e POSTGRES_DB=testdb \
            -p 5432:5432 "$ImageTimescaleDB"

          docker run -d --name stl-test-redis --network stl-test \
            -p 6379:6379 "$ImageRedis"

          docker run -d --name stl-test-localstack --network stl-test \
            -e SERVICES=sns,sqs,s3 -e DEBUG=0 -e DISABLE_EVENTS=1 \
            -e SKIP_SSL_CERT_DOWNLOAD=1 \
            -p 4566:4566 "$ImageLocalStack"

          # Wait for TimescaleDB to be ready (it logs the ready line twice).
          for i in $(seq 1 60); do
            if [ "$(docker logs stl-test-db 2>&1 | grep -c 'database system is ready to accept connections')" -ge 2 ]; then
              break
            fi
            sleep 1
          done
          docker exec stl-test-db pg_isready -U test -d testdb

          # Wait for Redis.
          for i in $(seq 1 30); do
            if docker exec stl-test-redis redis-cli ping >/dev/null 2>&1; then break; fi
            sleep 1
          done

          # Wait for LocalStack "Ready." log.
          for i in $(seq 1 60); do
            if docker logs stl-test-localstack 2>&1 | grep -q 'Ready\.'; then break; fi
            sleep 1
          done

      - name: Run integration tests
        env:
          STL_TEST_DB_DSN: postgres://test:test@localhost:5432/testdb?sslmode=disable
          STL_TEST_REDIS_ADDR: localhost:6379
          STL_TEST_LOCALSTACK_ENDPOINT: http://localhost:4566
        run: make test-integration

      - name: Dump shared service logs on failure
        if: failure()
        run: |
          for c in stl-test-db stl-test-redis stl-test-localstack; do
            echo "::group::$c logs"; docker logs --tail=200 "$c" || true; echo "::endgroup::"
          done

  python-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    uses: ./.github/workflows/python-ci.yml
    secrets: inherit

  ts-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    uses: ./.github/workflows/ts-ci.yml
    secrets: inherit

  call-deploy:
    name: Deploy
    needs:
      - detect-changes
      - go-ci
      - go-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.go-ci.result == 'success' && needs.go-integration.result == 'success'
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      sha: ${{ github.sha }}

  success:
    name: Success
    needs:
      - detect-changes
      - go-ci
      - go-integration
      - python-ci
      - ts-ci
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Report success
        run: echo 'All required CI checks passed or were skipped.'
