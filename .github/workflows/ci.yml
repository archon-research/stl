name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/overlays/staging/kustomization.yaml'
      - 'k8s/overlays/prod/kustomization.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.changed-files.outputs.go_any_changed }}
      python: ${{ steps.changed-files.outputs.python_any_changed }}
      ts: ${{ steps.changed-files.outputs.ts_any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47.0.0
        with:
          files_yaml_from_source_file: .github/changed-files.yml

  verify-signatures:
    name: Verify Signed Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check all PR commits are signed and verified
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          unsigned=$(gh api \
            --paginate \
            "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq '.[] | select(.commit.verification.verified == false) | "\(.sha) by \(.commit.author.name) <\(.commit.author.email)>: \(.commit.verification.reason)"')
          if [ -n "$unsigned" ]; then
            echo "::error::Unsigned or unverified commits found in this PR. All commits must be signed."
            echo "$unsigned"
            echo ""
            echo "See: https://docs.github.com/en/authentication/managing-commit-signature-verification"
            exit 1
          fi
          echo "All commits are signed and verified."

  go-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    uses: ./.github/workflows/go-ci.yml
    secrets: inherit

  python-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    uses: ./.github/workflows/python-ci.yml
    secrets: inherit

  ts-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    uses: ./.github/workflows/ts-ci.yml
    secrets: inherit

  ci-passed:
    name: Success
    needs:
      - detect-changes
      - verify-signatures
      - go-ci
      - python-ci
      - ts-ci
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Report success
        run: echo 'All required CI checks passed or were skipped.'

  call-deploy:
    name: Deploy
    needs:
      - detect-changes
      - ci-passed
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.ci-passed.result == 'success' &&
      (
        needs.detect-changes.outputs.go == 'true' ||
        needs.detect-changes.outputs.python == 'true' ||
        needs.detect-changes.outputs.ts == 'true'
      )
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      sha: ${{ github.sha }}
