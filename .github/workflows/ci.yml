# Actions are pinned to commit SHAs for supply-chain security.
# To update: git ls-remote --tags https://github.com/<org>/<action>.git | grep <tag>
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/overlays/staging/kustomization.yaml"
      - "k8s/overlays/prod/kustomization.yaml"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "stl-verify/python/**"
      - ".github/workflows/python-ci.yml"

# Cancel in-progress CI runs for the same branch/PR.
# Safe: the deploy workflow has its own concurrency groups that prevent cancellation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: stl-verify # TODO: When we add more stl components we need to adjust this or have different jobs for each component

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache: true
          cache-dependency-path: "stl-verify/go.sum"

      # Install CI tools (staticcheck, golangci-lint, govulncheck)
      - name: Install tools
        run: make tools

      # Run lint/format/static/security checks
      - name: Run lint/static checks
        run: make ci-checks

      # Run unit tests with race detector
      - name: Run unit tests
        run: make test-race

      # Fail if any files were modified (e.g., by go mod tidy, go fmt or something else)
      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::CI modified files. Please run 'make fmt tidy' locally and commit the changes."
            git diff --name-only
            exit 1
          fi

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20

    defaults:
      run:
        working-directory: stl-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache: true
          cache-dependency-path: "stl-verify/go.sum"

      # Derive image tags directly from the Go source so this step is always
      # aligned with what the tests actually use. The single source of truth is
      # stl-verify/internal/testutil/images.go.
      - name: Pull container images
        run: |
          IMAGES=$(grep -E 'Image[A-Za-z0-9_]+\s*=' internal/testutil/images.go | grep -oP '".*?"' | tr -d '"')
          if [ -z "$IMAGES" ]; then
            echo "::error::No image constants found in internal/testutil/images.go — check the grep pattern"
            exit 1
          fi
          for IMAGE in $IMAGES; do
            docker pull "$IMAGE"
          done

      # Integration tests require Docker services (TimeScale, Redis, ...)
      # testcontainers will spin up these services automatically
      - name: Run integration tests
        run: make test-integration

  call-deploy:
    name: Deploy
    needs: [integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      sha: ${{ github.sha }}
