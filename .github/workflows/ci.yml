name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/overlays/staging/kustomization.yaml'
      - 'k8s/overlays/prod/kustomization.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.changed-files.outputs.go_any_changed }}
      python: ${{ steps.changed-files.outputs.python_any_changed }}
      ts: ${{ steps.changed-files.outputs.ts_any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47.0.0
        with:
          files_yaml_from_source_file: .github/changed-files.yml

  go-ci:
    name: Lint, Test & Build
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: stl-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'stl-verify/go.mod'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Install tools
        run: make tools

      - name: Run lint/static checks
        run: make ci-checks

      - name: Run unit tests
        run: make test-race

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::CI modified files. Please run 'make fmt tidy' locally and commit the changes."
            git diff --name-only
            exit 1
          fi

  go-integration:
    name: Integration Tests
    needs:
      - detect-changes
      - go-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: stl-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'stl-verify/go.mod'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Pull container images
        run: |
          IMAGES=$(grep -E 'Image[A-Za-z0-9_]+\s*=' internal/testutil/images.go | grep -oP '".*?"' | tr -d '"')
          if [ -z "$IMAGES" ]; then
            echo "::error::No image constants found in internal/testutil/images.go — check the grep pattern"
            exit 1
          fi
          for IMAGE in $IMAGES; do
            docker pull "$IMAGE"
          done

      - name: Run integration tests
        run: make test-integration

  python-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    uses: ./.github/workflows/python-ci.yml
    secrets: inherit

  ts-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    uses: ./.github/workflows/ts-ci.yml
    secrets: inherit

  call-deploy:
    name: Deploy
    needs:
      - detect-changes
      - go-ci
      - go-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.go-ci.result == 'success' && needs.go-integration.result == 'success'
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      sha: ${{ github.sha }}

  success:
    name: Success
    needs:
      - detect-changes
      - go-ci
      - go-integration
      - python-ci
      - ts-ci
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Report success
        run: echo 'All required CI checks passed or were skipped.'
