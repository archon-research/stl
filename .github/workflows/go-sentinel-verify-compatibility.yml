name: Go Sentinel Verify Compatibility

on:
  workflow_call:
    inputs:
      stl_ref:
        description: Ref of archon-research/stl to test against
        required: false
        type: string
        default: main
      replacement_mode:
        description: Replacement mode (folder or artifact)
        required: true
        type: string
      replacement_path:
        description: Caller-repo-relative path to folder containing contract files. If artifact_name is set, this is resolved relative to downloaded artifact directory.
        required: true
        type: string
      artifact_name:
        description: Optional artifact name containing exported contract files
        required: false
        type: string
        default: ''
      caller_repository:
        description: Repository to checkout for replacement artifact/path
        required: false
        type: string
        default: ''
      caller_ref:
        description: Ref to checkout for caller repository
        required: false
        type: string
        default: ''
      contract_json_name:
        description: Contract JSON file name
        required: false
        type: string
        default: axis_synome_entities.json
      contract_schema_name:
        description: Contract JSON schema file name
        required: false
        type: string
        default: axis_synome_entities.schema.json
      go_test_target:
        description: Go package(s) to test for compatibility gate
        required: false
        type: string
        default: ./internal/pkg/axis_synome_contract
  workflow_dispatch:
    inputs:
      stl_ref:
        description: Ref of archon-research/stl to test against
        required: false
        default: main
      replacement_mode:
        description: Replacement mode (folder or artifact)
        required: true
        type: choice
        options:
          - folder
          - artifact
      replacement_path:
        description: Caller-repo-relative path to folder containing contract files. If artifact_name is set, this is resolved relative to downloaded artifact directory.
        required: true
      artifact_name:
        description: Optional artifact name containing exported contract files
        required: false
        default: ''
      caller_repository:
        description: Repository to checkout for replacement artifact/path
        required: false
        default: ''
      caller_ref:
        description: Ref to checkout for caller repository
        required: false
        default: ''
      contract_json_name:
        description: Contract JSON file name
        required: false
        default: axis_synome_entities.json
      contract_schema_name:
        description: Contract JSON schema file name
        required: false
        default: axis_synome_entities.schema.json
      go_test_target:
        description: Go package(s) to test for compatibility gate
        required: false
        default: ./internal/pkg/axis_synome_contract

permissions:
  actions: read
  contents: read

jobs:
  compatibility:
    name: Compatibility Gate (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout stl at selected ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: archon-research/stl
          ref: ${{ inputs.stl_ref }}
          path: stl
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.caller_repository != '' && inputs.caller_repository || github.repository }}
          ref: ${{ inputs.caller_ref != '' && inputs.caller_ref || github.sha }}
          path: caller
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: stl/.go-version
          cache: true
          cache-dependency-path: stl/stl-verify/go.sum

      - name: Download contract artifact
        if: ${{ inputs.replacement_mode == 'artifact' && inputs.artifact_name != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: caller-artifact

      - name: Resolve contract source
        id: resolve
        env:
          REPLACEMENT_MODE: ${{ inputs.replacement_mode }}
          REPLACEMENT_PATH: ${{ inputs.replacement_path }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail
          caller_root="$GITHUB_WORKSPACE/caller"

          case "$REPLACEMENT_MODE" in
            folder)
              source_dir="$caller_root/$REPLACEMENT_PATH"
              ;;
            artifact)
              source_root="$caller_root"
              if [ -n "$ARTIFACT_NAME" ]; then
                source_root="$GITHUB_WORKSPACE/caller-artifact"
              fi
              source_dir="$source_root/$REPLACEMENT_PATH"
              ;;
            *)
              echo "::error::Unsupported replacement_mode '$REPLACEMENT_MODE'. Use folder or artifact."
              exit 1
              ;;
          esac

          if [ ! -d "$source_dir" ]; then
            echo "::error::Contract source directory does not exist: $source_dir"
            exit 1
          fi

          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"

      - name: Replace axis-synome contract files
        env:
          SOURCE_DIR: ${{ steps.resolve.outputs.source_dir }}
          CONTRACT_JSON_NAME: ${{ inputs.contract_json_name }}
          CONTRACT_SCHEMA_NAME: ${{ inputs.contract_schema_name }}
        run: |
          set -euo pipefail
          source_dir="$(realpath "$SOURCE_DIR")"
          target_dir="$GITHUB_WORKSPACE/stl/stl-verify/contracts/axis-synome"
          mkdir -p "$target_dir"
          target_dir="$(realpath "$target_dir")"

          for f in "$CONTRACT_JSON_NAME" "$CONTRACT_SCHEMA_NAME"; do
            if [[ "$f" != "$(basename "$f")" || "$f" == *".."* || "$f" == *"\\"* ]]; then
              echo "::error::Invalid contract file name: $f"
              exit 1
            fi
          done

          copy_contract_file() {
            local file_name="$1"
            local source_file="$source_dir/$file_name"
            local target_file="$target_dir/$file_name"
            local source_real
            local target_real

            source_real="$(realpath "$source_file")"
            target_real="$(realpath -m "$target_file")"

            if [[ "$source_real" != "$source_dir"/* ]]; then
              echo "::error::Source path escapes source directory: $file_name"
              exit 1
            fi
            if [[ "$target_real" != "$target_dir"/* ]]; then
              echo "::error::Target path escapes target directory: $file_name"
              exit 1
            fi

            cp "$source_real" "$target_real"
          }

          copy_contract_file "$CONTRACT_JSON_NAME"
          copy_contract_file "$CONTRACT_SCHEMA_NAME"

      - name: Run Go compatibility gate
        working-directory: stl/stl-verify
        env:
          GO_TEST_TARGET: ${{ inputs.go_test_target }}
        run: |
          set -euo pipefail
          if [[ ! "$GO_TEST_TARGET" =~ ^\./[A-Za-z0-9_./-]+$ || "$GO_TEST_TARGET" == *".."* ]]; then
            echo "::error::Invalid go_test_target: $GO_TEST_TARGET"
            exit 1
          fi
          go test "$GO_TEST_TARGET"

      - name: Summarize run
        if: ${{ always() }}
        env:
          STL_REF: ${{ inputs.stl_ref }}
          CALLER_REPOSITORY: ${{ inputs.caller_repository != '' && inputs.caller_repository || github.repository }}
          CALLER_REF: ${{ inputs.caller_ref != '' && inputs.caller_ref || github.sha }}
          REPLACEMENT_MODE: ${{ inputs.replacement_mode }}
          REPLACEMENT_PATH: ${{ inputs.replacement_path }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          SOURCE_DIR: ${{ steps.resolve.outputs.source_dir }}
          CONTRACT_JSON_NAME: ${{ inputs.contract_json_name }}
          CONTRACT_SCHEMA_NAME: ${{ inputs.contract_schema_name }}
          GO_TEST_TARGET: ${{ inputs.go_test_target }}
        run: |
          {
            echo "## Go Sentinel Verify Compatibility Summary"
            echo ""
            echo "- stl_ref: $STL_REF"
            echo "- caller_repository: $CALLER_REPOSITORY"
            echo "- caller_ref: $CALLER_REF"
            echo "- replacement_mode: $REPLACEMENT_MODE"
            echo "- replacement_path: $REPLACEMENT_PATH"
            echo "- artifact_name: $ARTIFACT_NAME"
            echo "- resolved_source_dir: $SOURCE_DIR"
            echo "- contract_json_name: $CONTRACT_JSON_NAME"
            echo "- contract_schema_name: $CONTRACT_SCHEMA_NAME"
            echo "- go_test_target: $GO_TEST_TARGET"
          } >> "$GITHUB_STEP_SUMMARY"
