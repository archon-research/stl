name: Go Sentinel Verify Compatibility

on:
  workflow_call:
    inputs:
      stl_ref:
        description: Ref of archon-research/stl to test against
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      stl_ref:
        description: Ref of archon-research/stl to test against
        required: false
        default: main

permissions:
  actions: read
  contents: read

jobs:
  compatibility:
    name: Compatibility Gate (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout stl at selected ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: archon-research/stl
          ref: ${{ inputs.stl_ref }}
          path: stl
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: stl/.go-version
          cache: true
          cache-dependency-path: stl/stl-verify/go.sum

      - name: Download contract artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: axis-synome-entities
          path: caller-artifact

      - name: Resolve contract source
        id: resolve
        run: |
          set -euo pipefail
          source_dir="$GITHUB_WORKSPACE/caller-artifact"

          if [ ! -d "$source_dir" ]; then
            echo "::error::Contract source directory does not exist: $source_dir"
            exit 1
          fi

          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"

      - name: Replace axis-synome contract files
        env:
          SOURCE_DIR: ${{ steps.resolve.outputs.source_dir }}
        run: |
          set -euo pipefail
          source_dir="$(realpath "$SOURCE_DIR")"
          target_dir="$GITHUB_WORKSPACE/stl/stl-verify/contracts/axis-synome"
          mkdir -p "$target_dir"
          target_dir="$(realpath "$target_dir")"

          for f in axis_synome_entities.json axis_synome_entities.schema.json; do
            if [[ "$f" != "$(basename "$f")" || "$f" == *".."* || "$f" == *"\\"* ]]; then
              echo "::error::Invalid contract file name: $f"
              exit 1
            fi
          done

          copy_contract_file() {
            local file_name="$1"
            local source_file="$source_dir/$file_name"
            local target_file="$target_dir/$file_name"
            local source_real
            local target_real

            source_real="$(realpath "$source_file")"
            target_real="$(realpath -m "$target_file")"

            if [[ "$source_real" != "$source_dir"/* ]]; then
              echo "::error::Source path escapes source directory: $file_name"
              exit 1
            fi
            if [[ "$target_real" != "$target_dir"/* ]]; then
              echo "::error::Target path escapes target directory: $file_name"
              exit 1
            fi

            cp "$source_real" "$target_real"
          }

          copy_contract_file axis_synome_entities.json
          copy_contract_file axis_synome_entities.schema.json

      - name: Run Go compatibility gate
        working-directory: stl/stl-verify
        run: |
          set -euo pipefail
          go test ./internal/pkg/axis_synome_contract

      - name: Summarize run
        if: ${{ always() }}
        env:
          STL_REF: ${{ inputs.stl_ref }}
          SOURCE_DIR: ${{ steps.resolve.outputs.source_dir }}
        run: |
          {
            echo "## Go Sentinel Verify Compatibility Summary"
            echo ""
            echo "- stl_ref: $STL_REF"
            echo "- artifact_name: axis-synome-entities"
            echo "- resolved_source_dir: $SOURCE_DIR"
            echo "- contract_json_name: axis_synome_entities.json"
            echo "- contract_schema_name: axis_synome_entities.schema.json"
            echo "- go_test_target: ./internal/pkg/axis_synome_contract"
          } >> "$GITHUB_STEP_SUMMARY"
