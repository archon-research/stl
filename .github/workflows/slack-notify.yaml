# Reusable workflow that checks out the private github-actions repo and
# invokes slack-notify. Keeps the deploy key + checkout boilerplate in one place.
name: Slack Notify

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
      context:
        required: true
        type: string
      pr-url:
        required: false
        type: string
        default: ""
      failed-jobs:
        required: false
        type: string
        default: ""
      body:
        required: false
        type: string
        default: ""
    secrets:
      slack-webhook-url:
        required: true
      gh-actions-deploy-key:
        required: true

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: archon-research/github-actions
          ref: edcebe4624cc065fba9d01b1d85db0efb65c1897  # github-actions PR #22 merge SHA
          ssh-key: ${{ secrets.gh-actions-deploy-key }}
          path: .github-actions
          persist-credentials: false
      - uses: ./.github-actions/slack-notify
        with:
          slack-webhook-url: ${{ secrets.slack-webhook-url }}
          status: ${{ inputs.status }}
          context: ${{ inputs.context }}
          pr-url: ${{ inputs.pr-url }}
          failed-jobs: ${{ inputs.failed-jobs }}
          body: ${{ inputs.body }}
