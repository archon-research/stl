name: Debug If

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/debug-if.yml'
  workflow_dispatch:

# Mirror the real ci.yml structure: detect-changes -> {go-ci,python-ci,ts-ci} -> ci-passed -> call-deploy
# Mock outputs to simulate the #307 case (python=true, ts=true, go=false).

jobs:
  detect-changes:
    name: Mock detect-changes (python=true, ts=true, go=false)
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.set.outputs.go }}
      python: ${{ steps.set.outputs.python }}
      ts: ${{ steps.set.outputs.ts }}
    steps:
      - id: set
        run: |
          echo "go=false" >> "$GITHUB_OUTPUT"
          echo "python=true" >> "$GITHUB_OUTPUT"
          echo "ts=true" >> "$GITHUB_OUTPUT"

  go-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "go-ci ran"

  python-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "python-ci ran"

  ts-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "ts-ci ran"

  ci-passed:
    name: Success
    needs:
      - detect-changes
      - go-ci
      - python-ci
      - ts-ci
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - run: echo 'ci-passed succeeded'

  call-deploy-multiline:
    name: Deploy (multi-line if — real pattern)
    needs:
      - detect-changes
      - ci-passed
    if: |
      github.event_name == 'pull_request' &&
      needs.ci-passed.result == 'success' &&
      (
        needs.detect-changes.outputs.go == 'true' ||
        needs.detect-changes.outputs.python == 'true' ||
        needs.detect-changes.outputs.ts == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - run: echo "multi-line call-deploy FIRED"

  call-deploy-singleline:
    name: Deploy (single-line if)
    needs:
      - detect-changes
      - ci-passed
    if: ${{ github.event_name == 'pull_request' && needs.ci-passed.result == 'success' && (needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.ts == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "single-line call-deploy FIRED"

  debug-values:
    name: Echo resolved values
    needs:
      - detect-changes
      - ci-passed
      - go-ci
      - python-ci
      - ts-ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "outputs.go=${{ needs.detect-changes.outputs.go }}"
          echo "outputs.python=${{ needs.detect-changes.outputs.python }}"
          echo "outputs.ts=${{ needs.detect-changes.outputs.ts }}"
          echo "ci-passed.result=${{ needs.ci-passed.result }}"
          echo "go-ci.result=${{ needs.go-ci.result }}"
          echo "python-ci.result=${{ needs.python-ci.result }}"
          echo "ts-ci.result=${{ needs.ts-ci.result }}"
          echo "or_eval=${{ needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.ts == 'true' }}"
