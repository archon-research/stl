name: Python (stl-verify)

on:
  push:
    branches:
      - main
    paths:
      - "stl-verify/python/**"
      - "stl-verify/db/migrations/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "stl-verify/python/**"
      - "stl-verify/db/migrations/**"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: stl-verify/python

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          working-directory: stl-verify/python

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: make lint

  test:
    name: Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    defaults:
      run:
        working-directory: stl-verify/python

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          working-directory: stl-verify/python

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Unit tests
        run: make test-unit

      # Derive image tag directly from the Python source so this step is always
      # aligned with what the tests actually use. The single source of truth is
      # stl-verify/python/tests/integration/conftest.py.
      - name: Pull container images
        run: |
          IMAGE=$(grep -oP 'TIMESCALEDB_IMAGE\s*=\s*"\K[^"]+' tests/integration/conftest.py)
          if [ -z "$IMAGE" ]; then
            echo "::error::No TIMESCALEDB_IMAGE constant found in stl-verify/python/tests/integration/conftest.py — check the grep pattern"
            exit 1
          fi
          docker pull "$IMAGE"

      # Integration tests require Docker (testcontainers spins up TimescaleDB automatically)
      - name: Integration tests
        run: make test-integration
