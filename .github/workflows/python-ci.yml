name: Python (stl-verify)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: stl-verify/python

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: stl-verify/python

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Type check
        id: typecheck
        run: make typecheck

      - name: Lint
        if: ${{ !cancelled() }}
        run: make lint

  test:
    name: Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    defaults:
      run:
        working-directory: stl-verify/python

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: '.python-version'

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          working-directory: stl-verify/python

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Unit tests
        run: make test-unit

      # Derive image tag directly from the Python source so this step is always
      # aligned with what the tests actually use. The single source of truth is
      # stl-verify/python/tests/integration/conftest.py.
      - name: Pull container images
        run: |
          IMAGE=$(grep -oP 'TIMESCALEDB_IMAGE\s*=\s*"\K[^"]+' tests/integration/conftest.py)
          if [ -z "$IMAGE" ]; then
            echo "::error::No TIMESCALEDB_IMAGE constant found in stl-verify/python/tests/integration/conftest.py — check the grep pattern"
            exit 1
          fi
          docker pull "$IMAGE"

      # Integration tests require Docker (testcontainers spins up TimescaleDB automatically)
      - name: Integration tests
        run: make test-integration
