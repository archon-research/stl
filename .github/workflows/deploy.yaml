# TEMP: Entire file replaced with a verification-only build for the QEMU fix on
# branch vec-na-fix-qemu-ui-build. This version does NOT push anything to ECR,
# does NOT update kustomization, does NOT open prod PRs. It only builds the
# python-api image for arm64 to prove the Dockerfile change works.
# Revert this file to origin/main before merging:
#   git checkout origin/main -- .github/workflows/deploy.yaml
name: Deploy

on:
  push:
    branches:
      - vec-na-fix-qemu-ui-build

jobs:
  verify-python-api-build:
    name: Verify python-api build (temp, no push)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build python-api for arm64 (no push)
        working-directory: stl-verify
        env:
          UIKIT_GH_PACKAGES_READ_TOKEN: ${{ secrets.UIKIT_GH_PACKAGES_READ_TOKEN }}
        run: |
          docker buildx build --platform linux/arm64 \
            --secret id=uikit_token,env=UIKIT_GH_PACKAGES_READ_TOKEN \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            -f python/Dockerfile \
            -t stl-python-api:verify \
            .
