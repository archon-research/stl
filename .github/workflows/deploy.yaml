# Actions are pinned to commit SHAs for supply-chain security.
# To update: git ls-remote --tags https://github.com/<org>/<action>.git | grep <tag>
name: Deploy

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to HEAD of selected branch)"
        required: false
        type: string

jobs:
  build-push-staging:
    name: Build & Push Images (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: deploy-build-staging
      cancel-in-progress: false
    env:
      AWS_REGION: eu-west-1
      STAGING_REGISTRY: 579039992622.dkr.ecr.eu-west-1.amazonaws.com
      STAGING_ROLE_ARN: arn:aws:iam::579039992622:role/stl-sentinelstaging-github-actions-ecr
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to staging ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$STAGING_REGISTRY"

      - name: Build and push all images to staging ECR
        working-directory: stl-verify
        run: make docker-release-all ENV=sentinelstaging IMAGE_TAG=${{ inputs.sha || github.sha }}

  update-staging:
    name: Update Staging Image Tags
    needs: build-push-staging
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-update-staging
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Commit and push to main (via API for verified commits)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA=${{ inputs.sha || github.sha }}
          REPO="${{ github.repository }}"

          # Retry loop to handle concurrent updates to main
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt ${attempt}/${MAX_RETRIES}"

            # Fetch latest main and apply the tag update on top of it
            git fetch origin main
            git checkout FETCH_HEAD -- k8s/overlays/staging/kustomization.yaml
            sed -i "s/newTag: .*/newTag: \"$SHA\"/" k8s/overlays/staging/kustomization.yaml

            # Check if the file actually changed vs current main
            if git diff --quiet FETCH_HEAD -- k8s/overlays/staging/kustomization.yaml; then
              echo "No changes to commit"
              exit 0
            fi

            # Get current main HEAD and its tree
            MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
            BASE_TREE=$(gh api "repos/${REPO}/git/commits/${MAIN_SHA}" --jq '.tree.sha')

            # Create a new tree with the updated file
            NEW_TREE=$(gh api "repos/${REPO}/git/trees" \
              --method POST \
              --input - <<TREE_EOF | jq -r '.sha'
          {
            "base_tree": "${BASE_TREE}",
            "tree": [{
              "path": "k8s/overlays/staging/kustomization.yaml",
              "mode": "100644",
              "type": "blob",
              "content": $(cat k8s/overlays/staging/kustomization.yaml | jq -Rs .)
            }]
          }
          TREE_EOF
            )

            # Create a verified commit via the API
            NEW_COMMIT=$(gh api "repos/${REPO}/git/commits" \
              --method POST \
              --field "message=deploy(staging): update image tags to ${SHA}" \
              --field "tree=${NEW_TREE}" \
              --field "parents[]=${MAIN_SHA}" \
              --jq '.sha')

            # Try to fast-forward main — fails if main moved since we read MAIN_SHA
            REF_OUTPUT=$(gh api "repos/${REPO}/git/refs/heads/main" \
              --method PATCH \
              --field "sha=${NEW_COMMIT}" 2>&1) && {
              echo "Successfully updated main to ${NEW_COMMIT}"
              exit 0
            }

            echo "Ref update failed: ${REF_OUTPUT}"
            echo "Retrying..."
            sleep 1
          done

          echo "Failed to update main after ${MAX_RETRIES} attempts"
          exit 1

  build-push-prod:
    name: Build & Push Images (Prod)
    needs: build-push-staging
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-build-prod
      cancel-in-progress: false
    env:
      AWS_REGION: eu-west-1
      STAGING_REGISTRY: 579039992622.dkr.ecr.eu-west-1.amazonaws.com
      STAGING_ROLE_ARN: arn:aws:iam::579039992622:role/stl-sentinelstaging-github-actions-ecr
      PROD_REGISTRY: 030797368798.dkr.ecr.eu-west-1.amazonaws.com
      PROD_ROLE_ARN: arn:aws:iam::030797368798:role/stl-sentinelprod-github-actions-ecr
      SERVICES: watcher backup-worker oracle-price-worker sparklend-position-tracker morpho-indexer allocation-tracker temporal-worker prime-debt-indexer migrate
    permissions:
      id-token: write
    steps:
      # Pull images from staging ECR, retag and push to prod (no build needed)
      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to staging ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$STAGING_REGISTRY"

      - name: Pull all images from staging ECR
        run: |
          SHA=${{ inputs.sha || github.sha }}
          for service in $SERVICES; do
            docker pull "$STAGING_REGISTRY/stl-sentinelstaging-$service:$SHA"
          done

      # Retag and push to prod ECR
      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to prod ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$PROD_REGISTRY"

      - name: Retag and push all images to prod ECR
        run: |
          SHA=${{ inputs.sha || github.sha }}
          for service in $SERVICES; do
            docker tag "$STAGING_REGISTRY/stl-sentinelstaging-$service:$SHA" "$PROD_REGISTRY/stl-sentinelprod-$service:$SHA"
            docker push "$PROD_REGISTRY/stl-sentinelprod-$service:$SHA"
          done

  create-prod-pr:
    name: Create Prod Deploy PR
    needs: build-push-prod
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-prod-pr
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Update prod kustomization image tags
        run: |
          SHA=${{ inputs.sha || github.sha }}
          sed -i "s/newTag: .*/newTag: \"$SHA\"/" k8s/overlays/prod/kustomization.yaml

      - name: Create or update prod PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA=${{ inputs.sha || github.sha }}
          SHORT_SHA=${SHA:0:7}
          BRANCH="deploy/prod-${SHORT_SHA}"
          REPO="${{ github.repository }}"

          # Get current main HEAD and its tree
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${MAIN_SHA}" --jq '.tree.sha')

          # Create a new tree with the updated file
          NEW_TREE=$(gh api "repos/${REPO}/git/trees" \
            --method POST \
            --input - <<TREE_EOF | jq -r '.sha'
          {
            "base_tree": "${BASE_TREE}",
            "tree": [{
              "path": "k8s/overlays/prod/kustomization.yaml",
              "mode": "100644",
              "type": "blob",
              "content": $(cat k8s/overlays/prod/kustomization.yaml | jq -Rs .)
            }]
          }
          TREE_EOF
          )

          # Create a verified commit via the API
          NEW_COMMIT=$(gh api "repos/${REPO}/git/commits" \
            --method POST \
            --field "message=deploy(prod): update image tags to ${SHORT_SHA}" \
            --field "tree=${NEW_TREE}" \
            --field "parents[]=${MAIN_SHA}" \
            --jq '.sha')

          # Create the branch pointing to the new commit
          gh api "repos/${REPO}/git/refs" \
            --method POST \
            --field "ref=refs/heads/${BRANCH}" \
            --field "sha=${NEW_COMMIT}" || \
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            --field "sha=${NEW_COMMIT}" \
            --field "force=true"

          # Close any existing deploy/prod-* PRs
          EXISTING_PRS=$(gh pr list --search "deploy(prod): update image tags" --json number --jq '.[].number' 2>/dev/null || echo "")
          for pr in $EXISTING_PRS; do
            gh pr close "$pr" --comment "Superseded by deploy for ${SHORT_SHA}"
          done

          gh pr create \
            --title "deploy(prod): update image tags to ${SHORT_SHA}" \
            --body "$(cat <<EOF
          Automated prod image tag update.

          **Commit:** ${SHA}
          **Images pushed to:** prod ECR (030797368798)

          Merge this PR to update prod kustomization, then manually sync in ArgoCD.
          EOF
          )" \
            --head "$BRANCH" \
            --base main
