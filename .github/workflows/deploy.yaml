# Actions are pinned to commit SHAs for supply-chain security.
# To update: git ls-remote --tags https://github.com/<org>/<action>.git | grep <tag>
name: Deploy

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to HEAD of selected branch)"
        required: false
        type: string

jobs:
  build-push-staging:
    name: Build & Push Images (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: deploy-build-staging
      cancel-in-progress: false
    env:
      AWS_REGION: eu-west-1
      STAGING_REGISTRY: 579039992622.dkr.ecr.eu-west-1.amazonaws.com
      STAGING_ROLE_ARN: arn:aws:iam::579039992622:role/stl-sentinelstaging-github-actions-ecr
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to staging ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$STAGING_REGISTRY"

      - name: Build and push all images to staging ECR
        working-directory: stl-verify
        run: make docker-release-all ENV=sentinelstaging IMAGE_TAG=${{ inputs.sha || github.sha }}

  update-staging:
    name: Update Staging Image Tags
    needs: build-push-staging
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-update-staging
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Commit and push to main (via API for verified commits)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA=${{ inputs.sha || github.sha }}
          REPO="${{ github.repository }}"

          # Retry loop to handle concurrent updates to main
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt ${attempt}/${MAX_RETRIES}"

            # Fetch latest main and apply the tag update on top of it
            git fetch origin main
            git checkout FETCH_HEAD -- k8s/overlays/staging/kustomization.yaml
            # Update plain SHA tags (regular services) and prefixed tags (cronjobs: name-SHA)
            sed -i -E "s/(newTag: \")(([a-z]+-)*)[a-f0-9]{40}/\1\2$SHA/" k8s/overlays/staging/kustomization.yaml

            # Check if the file actually changed vs current main
            if git diff --quiet FETCH_HEAD -- k8s/overlays/staging/kustomization.yaml; then
              echo "No changes to commit"
              exit 0
            fi

            # Get current main HEAD and its tree
            MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
            BASE_TREE=$(gh api "repos/${REPO}/git/commits/${MAIN_SHA}" --jq '.tree.sha')

            # Create a new tree with the updated file
            NEW_TREE=$(gh api "repos/${REPO}/git/trees" \
              --method POST \
              --input - <<TREE_EOF | jq -r '.sha'
          {
            "base_tree": "${BASE_TREE}",
            "tree": [{
              "path": "k8s/overlays/staging/kustomization.yaml",
              "mode": "100644",
              "type": "blob",
              "content": $(cat k8s/overlays/staging/kustomization.yaml | jq -Rs .)
            }]
          }
          TREE_EOF
            )

            # Create a verified commit via the API
            NEW_COMMIT=$(gh api "repos/${REPO}/git/commits" \
              --method POST \
              --field "message=deploy(staging): update image tags to ${SHA}" \
              --field "tree=${NEW_TREE}" \
              --field "parents[]=${MAIN_SHA}" \
              --jq '.sha')

            # Try to fast-forward main — fails if main moved since we read MAIN_SHA
            REF_OUTPUT=$(gh api "repos/${REPO}/git/refs/heads/main" \
              --method PATCH \
              --field "sha=${NEW_COMMIT}" 2>&1) && {
              echo "Successfully updated main to ${NEW_COMMIT}"
              exit 0
            }

            echo "Ref update failed: ${REF_OUTPUT}"
            echo "Retrying..."
            sleep 1
          done

          echo "Failed to update main after ${MAX_RETRIES} attempts"
          exit 1

  wait-staging-healthy:
    name: Wait for Staging Healthy
    needs: update-staging
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-wait-staging
      cancel-in-progress: false
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: archon-research/github-actions
          ref: a42ba946a0cb774eef6a0d321a2545d2c1310b29  # argocd-wait (DNS fix #20)
          ssh-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}
          path: .github-actions
          persist-credentials: false

      - uses: ./.github-actions/argocd-wait
        with:
          app: stl-staging
          server: http://argocd-prod-archon
          timeout: "300"
          min-wait: "30"
          aws-role-arn: arn:aws:iam::030797368798:role/archonprod-github-actions-argocd-wait
          tailscale-secret-id: archon-prod-argocd-ci-tailscale-oauth
          argocd-token-secret-id: archon-prod-argocd-ci-token

  build-push-prod:
    name: Build & Push Images (Prod)
    needs: [build-push-staging, wait-staging-healthy]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-build-prod
      cancel-in-progress: false
    env:
      AWS_REGION: eu-west-1
      STAGING_REGISTRY: 579039992622.dkr.ecr.eu-west-1.amazonaws.com
      STAGING_ROLE_ARN: arn:aws:iam::579039992622:role/stl-sentinelstaging-github-actions-ecr
      PROD_REGISTRY: 030797368798.dkr.ecr.eu-west-1.amazonaws.com
      PROD_ROLE_ARN: arn:aws:iam::030797368798:role/stl-sentinelprod-github-actions-ecr
      SERVICES: watcher backup-worker oracle-price-worker sparklend-position-tracker morpho-indexer allocation-tracker prime-debt-indexer migrate python-api
      CRONJOBS: anchorage-indexer offchain-price-indexer watcher-data-validator
    permissions:
      id-token: write
    steps:
      # Pull images from staging ECR, retag and push to prod (no build needed)
      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to staging ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$STAGING_REGISTRY"

      - name: Pull all images from staging ECR
        run: |
          SHA=${{ inputs.sha || github.sha }}
          for service in $SERVICES; do
            docker pull "$STAGING_REGISTRY/stl-sentinelstaging-$service:$SHA"
          done
          for cj in $CRONJOBS; do
            docker pull "$STAGING_REGISTRY/stl-sentinelstaging-cronjob:$cj-$SHA"
          done

      # Retag and push to prod ECR
      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to prod ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$PROD_REGISTRY"

      - name: Retag and push all images to prod ECR
        run: |
          SHA=${{ inputs.sha || github.sha }}
          for service in $SERVICES; do
            docker tag "$STAGING_REGISTRY/stl-sentinelstaging-$service:$SHA" "$PROD_REGISTRY/stl-sentinelprod-$service:$SHA"
            docker push "$PROD_REGISTRY/stl-sentinelprod-$service:$SHA"
          done
          for cj in $CRONJOBS; do
            docker tag "$STAGING_REGISTRY/stl-sentinelstaging-cronjob:$cj-$SHA" "$PROD_REGISTRY/stl-sentinelprod-cronjob:$cj-$SHA"
            docker push "$PROD_REGISTRY/stl-sentinelprod-cronjob:$cj-$SHA"
          done

  create-prod-pr:
    name: Create Prod Deploy PR
    needs: build-push-prod
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod-pr
      cancel-in-progress: false
    outputs:
      pr_url: ${{ steps.create-pr.outputs.pr_url }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Build changelog
        id: changelog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -o pipefail
          SHA=${{ inputs.sha || github.sha }}
          SHORT_SHA=${SHA:0:7}
          REPO="${{ github.repository }}"

          # Get the SHA currently deployed in prod
          PROD_SHA=$(grep -m1 -oP '[a-f0-9]{40}' k8s/overlays/prod/kustomization.yaml || echo "")
          PROD_SHORT=${PROD_SHA:0:7}

          if [ -z "$PROD_SHA" ]; then
            echo "::error::Could not parse current prod SHA from kustomization.yaml"
            exit 1
          fi

          CHANGELOG=""

          if [ "$PROD_SHA" = "$SHA" ]; then
            CHANGELOG="No code changes (same SHA as current prod)."
          else
            # List merged PRs between the two SHAs
            TOTAL_PRS=0
            MERGED_PRS=$(git log --merges --format="%s" "${PROD_SHA}..${SHA}" \
              | grep -oP '#\d+' | sort -u || echo "")
            TOTAL_PRS=$(echo "$MERGED_PRS" | grep -c . || echo 0)
            DISPLAY_PRS=$(echo "$MERGED_PRS" | head -15)

            PR_LIST=""
            for pr_num in $DISPLAY_PRS; do
              num=${pr_num#\#}
              PR_INFO=$(gh pr view "$num" --json title,url,author --jq '"- [#'"$num"' \(.title)](\(.url)) by @\(.author.login)"' 2>/dev/null || echo "")
              if [ -n "$PR_INFO" ]; then
                PR_LIST="${PR_LIST}${PR_INFO}\n"
              fi
            done

            # List commits between current prod and new SHA (stl-verify/ only).
            # Use git's -n flag to limit at the source — piping through `head` can
            # SIGPIPE the upstream `git log`, which `set -o pipefail` + `bash -e`
            # turn into exit 141.
            TOTAL_COMMITS=$(git log --oneline --no-merges "${PROD_SHA}..${SHA}" -- stl-verify/ | wc -l | tr -d ' ')
            COMMITS=$(git log --oneline --no-merges -n 20 "${PROD_SHA}..${SHA}" -- stl-verify/)

            CHANGELOG="### Changes: \`${PROD_SHORT}\` → \`${SHORT_SHA}\`"
            if [ -n "$PR_LIST" ]; then
              CHANGELOG="${CHANGELOG}\n\n**Merged PRs:**\n${PR_LIST}"
              if [ "$TOTAL_PRS" -gt 15 ]; then
                CHANGELOG="${CHANGELOG}…and $((TOTAL_PRS - 15)) more"
              fi
            fi
            if [ -n "$COMMITS" ]; then
              CHANGELOG="${CHANGELOG}\n\n**Commits (stl-verify):**\n\`\`\`\n${COMMITS}\n\`\`\`"
              if [ "$TOTAL_COMMITS" -gt 20 ]; then
                CHANGELOG="${CHANGELOG}\n…and $((TOTAL_COMMITS - 20)) more"
              fi
            fi
          fi

          # Write to file to avoid quoting issues, then set output
          echo -e "$CHANGELOG" > /tmp/changelog.md
          {
            echo "changelog<<CHANGELOG_EOF"
            cat /tmp/changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update prod kustomization image tags
        run: |
          SHA=${{ inputs.sha || github.sha }}
          # Update plain SHA tags (regular services) and prefixed tags (cronjobs: name-SHA)
          sed -i -E "s/(newTag: \")(([a-z]+-)*)[a-f0-9]{40}/\1\2$SHA/" k8s/overlays/prod/kustomization.yaml

      - name: Create or update prod PR
        id: create-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA=${{ inputs.sha || github.sha }}
          SHORT_SHA=${SHA:0:7}
          BRANCH="deploy/prod-${SHORT_SHA}"
          REPO="${{ github.repository }}"

          # Get current main HEAD and its tree
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${MAIN_SHA}" --jq '.tree.sha')

          # Create a new tree with the updated file
          NEW_TREE=$(gh api "repos/${REPO}/git/trees" \
            --method POST \
            --input - <<TREE_EOF | jq -r '.sha'
          {
            "base_tree": "${BASE_TREE}",
            "tree": [{
              "path": "k8s/overlays/prod/kustomization.yaml",
              "mode": "100644",
              "type": "blob",
              "content": $(cat k8s/overlays/prod/kustomization.yaml | jq -Rs .)
            }]
          }
          TREE_EOF
          )

          # Create a verified commit via the API
          NEW_COMMIT=$(gh api "repos/${REPO}/git/commits" \
            --method POST \
            --field "message=deploy(prod): update image tags to ${SHORT_SHA}" \
            --field "tree=${NEW_TREE}" \
            --field "parents[]=${MAIN_SHA}" \
            --jq '.sha')

          # Create the branch pointing to the new commit
          gh api "repos/${REPO}/git/refs" \
            --method POST \
            --field "ref=refs/heads/${BRANCH}" \
            --field "sha=${NEW_COMMIT}" || \
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            --field "sha=${NEW_COMMIT}" \
            --field "force=true"

          # Build the PR body in a file and use --body-file. Avoid passing the
          # body via $(cat <<EOF ... EOF) — backticks in the changelog (code
          # fences, inline code) get interpreted as command substitution by
          # bash inside $(...) and the changelog gets silently dropped.
          {
            cat <<HEADER_EOF
          Automated prod image tag update.

          **Deploy SHA:** [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${SHA})
          **Images pushed to:** prod ECR (\`030797368798\`)
          **Triggered by:** @${{ github.actor }}

          HEADER_EOF
            cat /tmp/changelog.md
            cat <<'FOOTER_EOF'

          ---
          Merge this PR to update prod kustomization, then sync in ArgoCD.
          FOOTER_EOF
          } > /tmp/pr-body.md

          # Create the new prod deploy PR FIRST, so that if `gh pr create`
          # fails transiently we don't end up with no open prod-deploy PR
          # (older PRs would have already been closed).
          gh pr create \
            --title "deploy(prod): update image tags to ${SHORT_SHA}" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH" \
            --base main

          PR_URL=$(gh pr view "$BRANCH" --json url --jq .url)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          # Now that the new PR exists, close any older open deploy/prod-* PRs
          # (excluding the one we just created). Branch protection's "strict"
          # rule plus our concurrency group make this defensive, but it keeps
          # the PR list clean and removes ambiguity about which deploy is
          # current.
          # NOTE: filter by branch prefix — `gh pr list --search` treats `:` as
          # a search qualifier so the previous title-based search returned 0.
          EXISTING_PRS=$(gh pr list \
            --state open \
            --base main \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("deploy/prod-")) | select(.headRefName != "'"$BRANCH"'") | .number')
          for pr in $EXISTING_PRS; do
            gh pr close "$pr" --comment "Superseded by deploy for ${SHORT_SHA}"
          done

  notify-prod-pr-created:
    name: Notify Prod Deploy Awaiting Approval
    needs: create-prod-pr
    if: ${{ needs.create-prod-pr.result == 'success' }}
    uses: ./.github/workflows/slack-notify.yaml
    with:
      status: pending
      context: Prod Deploy
      pr-url: ${{ needs.create-prod-pr.outputs.pr_url }}
      body: ${{ needs.create-prod-pr.outputs.changelog }}
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
      gh-actions-deploy-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}

  notify-staging-failure:
    name: Notify Staging Deploy Failure
    if: ${{ always() && (needs.build-push-staging.result == 'failure' || needs.update-staging.result == 'failure' || needs.wait-staging-healthy.result == 'failure') }}
    needs: [build-push-staging, update-staging, wait-staging-healthy]
    uses: ./.github/workflows/slack-notify.yaml
    with:
      status: failure
      context: Staging Deploy
      failed-jobs: |
        Build & Push Images (Staging)=${{ needs.build-push-staging.result }}
        Update Staging Image Tags=${{ needs.update-staging.result }}
        Wait for Staging Healthy=${{ needs.wait-staging-healthy.result }}
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_STAGING }}
      gh-actions-deploy-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}

  notify-prod-failure:
    name: Notify Prod Deploy Failure
    if: ${{ always() && (needs.build-push-prod.result == 'failure' || needs.create-prod-pr.result == 'failure') }}
    needs: [build-push-prod, create-prod-pr]
    uses: ./.github/workflows/slack-notify.yaml
    with:
      status: failure
      context: Prod Deploy
      failed-jobs: |
        Build & Push Images (Prod)=${{ needs.build-push-prod.result }}
        Create Prod Deploy PR=${{ needs.create-prod-pr.result }}
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
      gh-actions-deploy-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}
