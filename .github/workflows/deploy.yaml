# Actions are pinned to commit SHAs for supply-chain security.
# To update: git ls-remote --tags https://github.com/<org>/<action>.git | grep <tag>
name: Deploy

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: deploy-build
      cancel-in-progress: false
    env:
      AWS_REGION: eu-west-1
      STAGING_REGISTRY: 579039992622.dkr.ecr.eu-west-1.amazonaws.com
      STAGING_ROLE_ARN: arn:aws:iam::579039992622:role/stl-sentinelstaging-github-actions-ecr
      PROD_REGISTRY: 030797368798.dkr.ecr.eu-west-1.amazonaws.com
      PROD_ROLE_ARN: arn:aws:iam::030797368798:role/stl-sentinelprod-github-actions-ecr
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to staging ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $STAGING_REGISTRY

      - name: Build and push all images to staging ECR
        working-directory: stl-verify
        run: make docker-release-all ENV=sentinelstaging IMAGE_TAG=${{ inputs.sha }}

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to prod ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $PROD_REGISTRY

      - name: Retag and push all images to prod ECR
        run: |
          SERVICES=(watcher backup-worker oracle-price-worker sparklend-position-tracker morpho-indexer allocation-tracker temporal-worker prime-debt-indexer)
          SHA=${{ inputs.sha }}
          for service in "${SERVICES[@]}"; do
            docker tag "$STAGING_REGISTRY/stl-sentinelstaging-$service:$SHA" "$PROD_REGISTRY/stl-sentinelprod-$service:$SHA"
            docker push "$PROD_REGISTRY/stl-sentinelprod-$service:$SHA"
          done

  update-kustomizations:
    name: Update Kustomizations
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 10
    concurrency:
      group: deploy-kustomizations
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Fetch latest main and reset
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Update image tags
        run: |
          SHA=${{ inputs.sha }}
          ./k8s/scripts/update-image-tags.sh k8s/overlays/staging 579039992622.dkr.ecr.eu-west-1.amazonaws.com sentinelstaging "$SHA"
          ./k8s/scripts/update-image-tags.sh k8s/overlays/prod 030797368798.dkr.ecr.eu-west-1.amazonaws.com sentinelprod "$SHA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/kustomization.yaml k8s/overlays/prod/kustomization.yaml
          git commit -m "ci: pin image tags to ${{ inputs.sha }}"
          git push
