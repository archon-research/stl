name: Go CI

on:
  workflow_call:

defaults:
  run:
    working-directory: stl-verify

jobs:
  lint:
    name: Lint & Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '.go-version'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Install tools
        run: make tools

      - name: Run lint/static checks
        run: make ci-checks

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::CI modified files. Please run 'make fmt tidy' locally and commit the changes."
            git diff --name-only
            exit 1
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '.go-version'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Run unit tests
        run: make test-race

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '.go-version'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Pull container images
        run: |
          IMAGES=$(grep -E 'Image[A-Za-z0-9_]+[[:space:]]*=' internal/testutil/images.go | grep -oP '".*?"' | tr -d '"')
          if [ -z "$IMAGES" ]; then
            echo "::error::No image constants found in internal/testutil/images.go -- check the grep pattern"
            exit 1
          fi
          for IMAGE in $IMAGES; do
            docker pull "$IMAGE"
          done

      - name: Run integration tests
        run: make test-integration
