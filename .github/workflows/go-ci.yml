name: Go CI

on:
  workflow_call:

defaults:
  run:
    working-directory: stl-verify

jobs:
  go-ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'stl-verify/go.mod'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Install tools
        run: make tools

      - name: Run lint/static checks
        run: make ci-checks

      - name: Run unit tests
        run: make test-race

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::CI modified files. Please run 'make fmt tidy' locally and commit the changes."
            git diff --name-only
            exit 1
          fi

  go-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'stl-verify/go.mod'
          cache: true
          cache-dependency-path: 'stl-verify/go.sum'

      - name: Pull container images
        run: |
          IMAGES=$(grep -E 'Image[A-Za-z0-9_]+[[:space:]]*=' internal/testutil/images.go | grep -oP '".*?"' | tr -d '"')
          if [ -z "$IMAGES" ]; then
            echo "::error::No image constants found in internal/testutil/images.go — check the grep pattern"
            exit 1
          fi
          for IMAGE in $IMAGES; do
            docker pull "$IMAGE"
          done

      - name: Run integration tests
        run: make test-integration
