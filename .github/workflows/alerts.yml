name: Alerts

on:
  pull_request:
    paths:
      - "alerts/**"
      - ".github/workflows/alerts.yml"
  push:
    branches: [main]
    paths:
      - "alerts/**"
      - ".github/workflows/alerts.yml"

concurrency:
  group: alerts-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default. Jobs that need more (staging/prod: id-token +
# pull-requests) declare their own block, which overrides this. The notify
# jobs reach Slack via webhook + an SSH deploy key, so they need no token.
permissions: {}

jobs:
  # Staging runs on PRs (for the diff preview comment) and on push to main.
  # Fork-PR guard: secrets aren't passed to fork PRs, but we also refuse to
  # run the job at all so it can't accidentally hit AWS even if the secret
  # check is ever moved around.
  # Dependabot guard: Dependabot runs lack the credentials this job needs, so
  # skip it for Dependabot PRs. A skipped job reports success, so it doesn't
  # block merge. The rules still sync on the subsequent push to main.
  staging:
    name: staging
    if: github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # AWS OIDC assume
      pull-requests: write  # diff comment upsert
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Check out internal actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: archon-research/github-actions
          ref: 532cad6ab3c982201364fa4526103b54696fb1eb  # github-actions PR #17 merge SHA
          ssh-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}
          path: .github-actions
          persist-credentials: false

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: arn:aws:iam::579039992622:role/archonstaging-github-actions-mimir-rules
          aws-region: eu-west-1

      - name: Fetch Grafana Cloud Mimir token (staging)
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53  # v2.0.10
        with:
          secret-ids: |
            GC,archonstaging-mimir-rules-token-vector
          parse-json-secrets: true

      - name: Sync rules
        uses: ./.github-actions/mimir-rules-sync
        with:
          team: vector
          namespaces-regex: '^vector-(watcher|backup-worker|indexers|psm3|postgres|cronjobs)$'
          rules-dir: alerts
          mimir-address: ${{ env.GC_MIMIR_ADDRESS }}
          mimir-tenant-id: ${{ env.GC_MIMIR_TENANT_ID }}
          mimir-token: ${{ env.GC_TOKEN }}
          cluster-label: ${{ env.GC_CLUSTER_LABEL }}
          env-label: ${{ env.GC_ENV_LABEL }}

  # Posts a Slack "awaiting approval" message before the gated prod job. The
  # prod job carries `environment: production`, so it parks at the manual gate
  # before any step runs — an in-job notify step would never fire while the job
  # is still waiting. This job depends only on `staging`, so it runs while prod
  # waits at the gate. Mirrors notify-prod-pr-created in deploy.yaml.
  notify-prod-pending:
    name: Notify Prod Alerts Sync Awaiting Approval
    needs: staging
    if: github.event_name == 'push'
    uses: ./.github/workflows/slack-notify.yaml
    with:
      status: pending
      context: Alerts Prod Sync
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
      gh-actions-deploy-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}

  # Prod only runs on push to main, and only after a `vector-engineers`
  # reviewer approves the `production` environment. PRs never reach this job
  # and the prod IAM role's trust policy should not include `:pull_request`.
  prod:
    name: prod
    if: github.event_name == 'push'
    needs: staging
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # AWS OIDC assume
      pull-requests: write  # diff comment upsert
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Check out internal actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: archon-research/github-actions
          ref: 532cad6ab3c982201364fa4526103b54696fb1eb  # github-actions PR #17 merge SHA
          ssh-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}
          path: .github-actions
          persist-credentials: false

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: arn:aws:iam::030797368798:role/archonprod-github-actions-mimir-rules
          aws-region: eu-west-1

      - name: Fetch Grafana Cloud Mimir token (prod)
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53  # v2.0.10
        with:
          secret-ids: |
            GC,archonprod-mimir-rules-token-vector
          parse-json-secrets: true

      - name: Sync rules
        uses: ./.github-actions/mimir-rules-sync
        with:
          team: vector
          namespaces-regex: '^vector-(watcher|backup-worker|indexers|psm3|postgres|cronjobs)$'
          rules-dir: alerts
          mimir-address: ${{ env.GC_MIMIR_ADDRESS }}
          mimir-tenant-id: ${{ env.GC_MIMIR_TENANT_ID }}
          mimir-token: ${{ env.GC_TOKEN }}
          cluster-label: ${{ env.GC_CLUSTER_LABEL }}
          env-label: ${{ env.GC_ENV_LABEL }}

  # Staging sync failures on push to main are silent otherwise. Scoped to push
  # only — a staging failure on a PR is already visible as a failed check, so a
  # Slack ping there would be noise.
  notify-staging-failure:
    name: Notify Staging Alerts Sync Failure
    needs: staging
    if: ${{ always() && github.event_name == 'push' && needs.staging.result == 'failure' }}
    uses: ./.github/workflows/slack-notify.yaml
    with:
      status: failure
      context: Alerts Staging Sync
      failed-jobs: |
        Sync staging alert rules=${{ needs.staging.result }}
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_STAGING }}
      gh-actions-deploy-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}

  # Catches prod failures that are otherwise silent: a failed rules sync after
  # approval, or a rejected `production` gate (both surface as result==failure).
  notify-prod-failure:
    name: Notify Prod Alerts Sync Failure
    needs: prod
    if: ${{ always() && needs.prod.result == 'failure' }}
    uses: ./.github/workflows/slack-notify.yaml
    with:
      status: failure
      context: Alerts Prod Sync
      failed-jobs: |
        Sync prod alert rules=${{ needs.prod.result }}
    secrets:
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
      gh-actions-deploy-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}
