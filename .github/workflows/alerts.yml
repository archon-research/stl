name: Alerts

on:
  pull_request:
    paths:
      - "alerts/**"
      - ".github/workflows/alerts.yml"
  push:
    branches: [main]
    paths:
      - "alerts/**"
      - ".github/workflows/alerts.yml"

concurrency:
  group: alerts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: ${{ matrix.env }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # AWS OIDC assume
      pull-requests: write  # diff comment upsert
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: staging
            role-arn: arn:aws:iam::579039992622:role/archonstaging-github-actions-mimir-rules
            secret-id: archonstaging-mimir-rules-token-vector
          - env: prod
            role-arn: arn:aws:iam::030797368798:role/archonprod-github-actions-mimir-rules
            secret-id: archonprod-mimir-rules-token-vector
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check out internal actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: archon-research/github-actions
          ref: d01e8d10d3dde91688fe9ee45d9338caaf02982d
          ssh-key: ${{ secrets.GH_ACTIONS_DEPLOY_KEY }}
          path: .github-actions
          persist-credentials: false

      - name: Configure AWS credentials (${{ matrix.env }})
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ matrix.role-arn }}
          aws-region: eu-west-1

      - name: Fetch Grafana Cloud Mimir token (${{ matrix.env }})
        uses: aws-actions/aws-secretsmanager-get-secrets@5e19ff380d035695bdd56bbad320ca535c9063f2  # v2.0.10
        with:
          secret-ids: |
            GC,${{ matrix.secret-id }}
          parse-json-secrets: true

      - name: Sync rules
        uses: ./.github-actions/mimir-rules-sync
        with:
          team: vector
          namespace: vector-${{ github.event.repository.name }}
          rules-dir: alerts
          mimir-address: ${{ env.GC_MIMIR_ADDRESS }}
          mimir-tenant-id: ${{ env.GC_MIMIR_TENANT_ID }}
          mimir-token: ${{ env.GC_TOKEN }}
          cluster-label: ${{ env.GC_CLUSTER_LABEL }}
          env-label: ${{ env.GC_ENV_LABEL }}
