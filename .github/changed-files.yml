go:
  - stl-verify/**
  - '!stl-verify/python/**'
  - '!stl-verify/ts/**'
  # A Go guardrail (allocation_tracker) parses the prod k8s ConfigMaps, so a
  # k8s-only unserve must trigger go-ci to catch a now-dropped contract chain.
  - k8s/base/**
  - k8s/overlays/**
  - .go-version
  - lefthook.yml
  - stl-verify/lefthook.yml
  - stl-verify/python/lefthook.yml
  - stl-verify/ts/lefthook.yml
  - .github/changed-files.yml
  - .github/workflows/ci.yml
  - .github/workflows/deploy.yaml
  - .github/workflows/go-ci.yml
  - .github/workflows/go-sentinel-verify-compatibility.yml

python:
  - stl-verify/python/**
  - stl-verify/db/migrations/**
  - .python-version
  - lefthook.yml
  - stl-verify/lefthook.yml
  - stl-verify/python/lefthook.yml
  - .github/changed-files.yml
  - .github/workflows/ci.yml
  - .github/workflows/deploy.yaml
  - .github/workflows/python-ci.yml
  - .github/workflows/python-sentinel-verify-compatibility.yml

ts:
  - stl-verify/ts/**
  - stl-verify/python/app/**
  - stl-verify/python/scripts/export_openapi_schema.py
  - stl-verify/python/Makefile
  - .node-version
  - lefthook.yml
  - stl-verify/lefthook.yml
  - stl-verify/ts/lefthook.yml
  - .github/changed-files.yml
  - .github/workflows/ci.yml
  - .github/workflows/deploy.yaml
  - .github/workflows/ts-ci.yml
